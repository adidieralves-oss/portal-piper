        ${r.photo ? `<img src="${r.photo}" style="width:32px;height:32px;object-fit:cover;">` : r.name[0].toUpperCase()}
      </div>
      <div class="ranking-info">
        <div class="ranking-name">${r.name}</div>
        <div class="ranking-meta">${r.dept||'Geral'} · ${r.lessonsCompleted} aulas · ${r.pct}%</div>
      </div>
      <div class="ranking-score">${r.points}</div>
    </div>`;
  }).join('')}`;
}

function toggleTrack(id, headerEl) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  const chevron = headerEl ? headerEl.querySelector('.track-chevron') : null;
  if (chevron) chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
}

// Abre modal de aula
function openLesson(ti, li, ii) {
  const tracks = DB.getTracks();
  const t = tracks[ti];
  if (!t) return;
  const lv = t.levels[li];
  if (!lv) return;
  const lessons = lv.lessons || [];
  const lesson = lessons[ii];
  if (!lesson) return;

  const u = getSession();
  const userId = getUserId(u);
  const trackKey = 'track_' + ti;
  const progKey = `${trackKey}_lv${li}_${ii}`;
  const progress = DB.getProgress(userId);
  const trackProg = progress[trackKey] || {};
  const isDone = trackProg[progKey] || false;

  // Update breadcrumb for context
  setBreadcrumb([
    { label:'Início', emoji:'🏠', action:'goHome()' },
    { label:'Universidade', emoji:'🎓', action:"showModule('universidade')" },
    { label:t.name, action:`showModule('universidade')` },
    { label:lv.level||'Nível '+(li+1), action:`showModule('universidade')` },
    { label:lesson.title||'Aula' },
  ]);

  // Renderizar mídia
  let mediaHtml = '';
  const url = lesson.url || '';
  switch(lesson.type) {
    case 'video':
      if (url.startsWith('data:')) {
        // Uploaded video file
        mediaHtml = `<video src="${url}" controls style="width:100%;border-radius:var(--radius-sm);max-height:400px;background:#000"></video>`;
      } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
        const ytId = url.includes('youtu.be/') ? url.split('youtu.be/')[1].split('?')[0]
          : (url.match(/v=([^&]+)/)||[])[1] || '';
        mediaHtml = ytId ? `<iframe src="https://www.youtube.com/embed/${ytId}" height="360" allowfullscreen style="border-radius:var(--radius-sm)"></iframe>` : `<a href="${url}" target="_blank" class="btn btn-primary">▶️ Abrir vídeo</a>`;
      } else if (url.includes('vimeo.com')) {
        const vmId = url.split('vimeo.com/')[1];
        mediaHtml = `<iframe src="https://player.vimeo.com/video/${vmId}" height="360" allowfullscreen style="border-radius:var(--radius-sm)"></iframe>`;
      } else if (url) {
        mediaHtml = `<video src="${url}" controls style="width:100%;border-radius:var(--radius-sm);max-height:360px"></video>`;
      }
      break;
    case 'image':
      mediaHtml = url ? `<img src="${url}" alt="${lesson.title}" style="width:100%;max-height:420px;object-fit:contain;border-radius:var(--radius-sm);background:#000">` : '';
      break;
    case 'pdf':
      if (url && url.startsWith('data:')) {
        mediaHtml = `<iframe src="${url}" height="500" style="border-radius:var(--radius-sm);border:1px solid var(--border);width:100%"></iframe>
          <a href="${url}" download="arquivo.pdf" class="btn btn-outline btn-sm" style="margin-top:8px;display:inline-flex">📥 Baixar PDF</a>`;
      } else if (url) {
        mediaHtml = `<iframe src="${url}" height="480" style="border-radius:var(--radius-sm);border:1px solid var(--border);width:100%"></iframe>
          <a href="${url}" target="_blank" class="btn btn-outline btn-sm" style="margin-top:8px;display:inline-flex">📑 Abrir em nova aba</a>`;
      }
      break;
    case 'slides':
      // Suporte Google Slides embed ou link direto
      if (url.includes('docs.google.com/presentation')) {
        const embedUrl = url.includes('/embed') ? url : url.replace('/edit', '/embed').replace('/pub', '/embed');
        mediaHtml = `<iframe src="${embedUrl}" height="420" allowfullscreen style="border-radius:var(--radius-sm)"></iframe>`;
      } else if (url) {
        mediaHtml = `<a href="${url}" target="_blank" class="btn btn-primary">📊 Abrir Slides</a>`;
      }
      break;
    case 'podcast':
      if (url.includes('spotify.com')) {
        const spotifyEmbed = url.replace('open.spotify.com/', 'open.spotify.com/embed/');
        mediaHtml = `<iframe src="${spotifyEmbed}" height="152" style="border-radius:var(--radius-sm)" frameborder="0"></iframe>`;
      } else if (url) {
        mediaHtml = `<audio src="${url}" controls style="width:100%;margin:10px 0;border-radius:8px"></audio>`;
      }
      break;
    case 'link':
      mediaHtml = url ? `<a href="${url}" target="_blank" class="btn btn-primary" style="display:inline-flex">🔗 Acessar conteúdo</a>` : '';
      break;
    default:
      mediaHtml = '';
  }

  const totalInLevel = lessons.length;
  const hasNext = ii < totalInLevel - 1;
  const hasPrev = ii > 0;

  const overlay = document.createElement('div');
  overlay.className = 'lesson-modal-overlay';
  overlay.id = 'lessonModal';
  overlay.innerHTML = `
    <div class="lesson-modal">
      <div class="lesson-modal-header">
        <div>
          <div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);margin-bottom:4px">${t.name} · ${lv.level} · Aula ${ii+1} de ${totalInLevel}</div>
          <h3>${lesson.title||'Sem título'}</h3>
        </div>
        <div class="lesson-modal-close" onclick="closeLessonModal()">✕</div>
      </div>
      <div class="lesson-modal-body">
        ${mediaHtml ? `<div style="margin-bottom:14px">${mediaHtml}</div>` : ''}
        ${lesson.description ? `<div class="lesson-desc">${lesson.description}</div>` : ''}
        ${!mediaHtml && !lesson.description ? `<p style="color:var(--text-dim);font-size:12px">Nenhum conteúdo de mídia configurado para esta aula.</p>` : ''}
      </div>
      <div class="lesson-modal-footer">
        ${hasPrev ? `<button class="btn btn-outline" onclick="closeLessonModal();openLesson(${ti},${li},${ii-1})">← Anterior</button>` : ''}
        ${!isDone
          ? `<button class="btn btn-primary" onclick="markLessonDone(${ti},${li},${ii})">✅ Marcar como concluído</button>`
          : `<span style="font-size:11px;color:var(--secondary);display:flex;align-items:center;gap:4px">✅ Concluído</span>`}
        ${hasNext && isDone ? `<button class="btn btn-primary" onclick="closeLessonModal();openLesson(${ti},${li},${ii+1})">Próxima →</button>` : ''}
        ${hasNext && !isDone ? `<button class="btn btn-outline" style="margin-left:auto" onclick="closeLessonModal();openLesson(${ti},${li},${ii+1})">Próxima →</button>` : ''}
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeLessonModal() {
  const m = document.getElementById('lessonModal');
  if (m) m.remove();
}

function markLessonDone(ti, li, ii) {
  const u = getSession();
  const userId = getUserId(u);
  const trackKey = 'track_' + ti;
  const progKey = `${trackKey}_lv${li}_${ii}`;
  const progress = DB.getProgress(userId);
  if (!progress[trackKey]) progress[trackKey] = {};
  progress[trackKey][progKey] = true;
  DB.setProgress(userId, progress);
  closeLessonModal();

  // Check achievements
  checkAchievementsAfterLesson(userId);

  // Check level/track completion
  const tracks = DB.getTracks();
  const lessons = (tracks[ti]?.levels[li]?.lessons) || [];
  const allDone = lessons.every((_, idx) => progress[trackKey][`${trackKey}_lv${li}_${idx}`]);
  if (allDone && lessons.length > 0) {
    // Check if it's a level complete achievement
    checkAndGrantAchievement(userId, 'level_1');
    showToast('🏅 Nível concluído! Próximo desbloqueado.');
  } else {
    showToast('✅ Aula concluída! +10 pontos');
    addUserPoints(userId, 10);
  }

  // Re-render universidade mantendo trilha aberta
  const el = document.getElementById('universidade');
  if (el && currentModule === 'universidade') {
    renderModule('universidade', el);
    setTimeout(() => {
      const body = document.getElementById('track-body-'+ti);
      if (body) { body.style.display = 'block'; const ch = body.closest('.track-card')?.querySelector('.track-chevron'); if(ch) ch.style.transform='rotate(180deg)'; }
    }, 60);
  }
}

  // ── FAQ

      <div class="admin-list">${playbooks.length ? playbooks.map((p, i) => `

  // ── SENHA
  const panelSenha = `<div class="admin-tab-panel${adminActiveTab==='senha'?' active':''}" id="atab-senha">
    <div class="admin-section"><h3>🔐 Senha de Administrador</h3>
      <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px">Altere a senha usada para acessar o portal como administrador.</p>

      </div>
      <button class="btn btn-primary" onclick="changeAdminPass()">🔐 Alterar Senha</button>

  return tabsHtml + panelBackup + panelIdentidade + panelOrg + panelUsuarios + panelComms + panelMetas + panelUni + panelFaq + panelPlaybooks + panelMural + panelConteudo + panelSenha;
}

function addDept() {
  const v = document.getElementById('newDept').value.trim();
  if (!v) return showToast('Informe o nome do departamento.');
  const org = DB.getOrg();
  if (org.depts.includes(v)) return showToast('Departamento já existe.');
  org.depts.push(v);
  DB.setOrg(org);
  document.getElementById('newDept').value = ''; switchAdminTab('org');
  showToast('Departamento criado! ✅');
}
function removeDept(d) {
  const org = DB.getOrg();
  org.depts = org.depts.filter(x => x !== d);
  DB.setOrg(org); switchAdminTab('org');
  showToast('Departamento removido.');
}
function addTeam() {
  const v = document.getElementById('newTeam').value.trim();
  if (!v) return showToast('Informe o nome da equipe.');
  const org = DB.getOrg();
  if (org.teams.includes(v)) return showToast('Equipe já existe.');
  org.teams.push(v);
  DB.setOrg(org);
  document.getElementById('newTeam').value = ''; switchAdminTab('org');
  showToast('Equipe criada! ✅');
}
function removeTeam(t) {
  const org = DB.getOrg();
  org.teams = org.teams.filter(x => x !== t);
  DB.setOrg(org); switchAdminTab('org');
  showToast('Equipe removida.');
}

    name,

let editUserTab = 'dados';

function editUser(i) {

  renderEditUserPopup(i);

function renderEditUserPopup(i) {
  const users = DB.getUsers();
  const u = users[i];
  const org = DB.getOrg();
  const uid = getUserId(u);
  const perms = DB.getUserPerms(uid) || {};
  const bg = getAvatarColor(u.name);
  const initial = (u.name||'?')[0].toUpperCase();

    { id:'dados',    label:'👤 Dados' },
    { id:'perms',    label:'🔒 Permissões' },
    { id:'foto',     label:'📷 Foto' },
  ];

  const tabsHtml = `<div class="module-tabs">${tabs.map(t =>
    `<button class="module-tab${editUserTab===t.id?' active':''}" onclick="editUserTab='${t.id}';renderEditUserPopup(${i})">${t.label}</button>`
  ).join('')}</div>`;

  // ── ABA DADOS

    <div class="form-row">
      <div class="form-group"><label>Nome</label><input class="form-input" id="eu_name" value="${u.name||''}"></div>
      <div class="form-group"><label>E-mail</label><input class="form-input" id="eu_email" value="${u.email||''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>WhatsApp</label><input class="form-input" id="eu_whatsapp" value="${u.whatsapp||''}"></div>
      <div class="form-group"><label>Cargo</label><input class="form-input" id="eu_cargo" value="${u.cargo||''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Departamento</label><select class="form-select" id="eu_dept"><option value="">—</option>${org.depts.map(d=>`<option ${d===u.dept?'selected':''}>${d}</option>`).join('')}</select></div>
      <div class="form-group"><label>Equipe</label><select class="form-select" id="eu_team"><option value="">—</option>${org.teams.map(t=>`<option ${t===u.team?'selected':''}>${t}</option>`).join('')}</select></div>
      <div class="form-group"><label>Perfil</label><select class="form-select" id="eu_role">${org.roles.map(r=>`<option ${r===u.role?'selected':''}>${r}</option>`).join('')}</select></div>
    </div>
    <div style="margin-top:14px;display:flex;gap:6px">
      <button class="btn btn-primary" onclick="saveEditUser(${i})">💾 Salvar Dados</button>
      <button class="btn btn-outline" onclick="closePopup()">Fechar</button>
    </div>
  </div>`;

  // ── ABA PERMISSÕES
  const permItems = ALL_MODULE_PERMS.map(p => {
    const isOn = perms[p.key] !== false; // default ON
    return `<div class="perm-item${isOn?' on':''}" onclick="togglePermItem(this,'${uid}','${p.key}',${i})">
      <span class="perm-emoji">${p.emoji}</span>
      <span class="perm-label">${p.label}${p.special && p.key==='sidebar'?'<br><span style="font-size:9px;color:var(--text-dim);font-weight:400">Ocultar menu lateral</span>':''}</span>
      <div class="perm-toggle"></div>
    </div>`;
  }).join('');

  const panelPerms = `<div class="module-panel${editUserTab==='perms'?' active':''}">
    <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px">Defina o que <strong>${u.name}</strong> pode ver no portal. Desative para ocultar o módulo da sidebar e impedir o acesso.</p>
    <div class="perm-grid">${permItems}</div>
    <div style="margin-top:14px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" onclick="resetPerms('${uid}',${i})">↺ Liberar Tudo</button>
      <button class="btn btn-danger btn-sm" onclick="blockAllPerms('${uid}',${i})">🚫 Bloquear Tudo</button>
      <button class="btn btn-outline" onclick="closePopup()" style="margin-left:auto">Fechar</button>

        ${u.photo ? `<img src="${u.photo}" style="width:80px;height:80px;object-fit:cover;">` : initial}
      </div>
    </div>
    ${renderUploadZone('admin-user-photo-'+i, 'image/*', 'JPG, PNG, WebP — máx 5MB')}
    <div style="margin-top:12px;display:flex;gap:6px">
      <button class="btn btn-primary" onclick="saveAdminUserPhoto(${i})">📷 Salvar Foto</button>
      ${u.photo ? `<button class="btn btn-danger" onclick="removeAdminUserPhoto(${i})">🗑️ Remover</button>` : ''}

function togglePermItem(el, uid, key, userIdx) {
  el.classList.toggle('on');
  const isOn = el.classList.contains('on');
  const perms = DB.getUserPerms(uid) || {};
  if (isOn) delete perms[key]; else perms[key] = false;
  DB.setUserPerms(uid, perms);
  // Se for o usuário logado, re-aplicar sidebar/módulos
  const session = getSession();
  if (getUserId(session) === uid) {
    applySidebarVisibility();
    renderSidebar();
  }
}

function resetPerms(uid, i) {
  DB.setUserPerms(uid, null);
  const session = getSession();
  if (getUserId(session) === uid) { applySidebarVisibility(); renderSidebar(); }
  renderEditUserPopup(i);
  showToast('Acesso total liberado! ✅');
}

function blockAllPerms(uid, i) {
  const all = {};
  ALL_MODULE_PERMS.forEach(p => { all[p.key] = false; });
  DB.setUserPerms(uid, all);
  const session = getSession();
  if (getUserId(session) === uid) { applySidebarVisibility(); renderSidebar(); }
  renderEditUserPopup(i);
  showToast('Todos os módulos bloqueados.');
}

function saveEditUser(i) {
  const users = DB.getUsers();
  users[i] = {
    ...users[i],
    name:     document.getElementById('eu_name')?.value || users[i].name,
    email:    document.getElementById('eu_email')?.value || users[i].email,
    whatsapp: document.getElementById('eu_whatsapp')?.value || users[i].whatsapp,
    cargo:    document.getElementById('eu_cargo')?.value || users[i].cargo,
    dept:     document.getElementById('eu_dept')?.value ?? users[i].dept,
    team:     document.getElementById('eu_team')?.value ?? users[i].team,
    role:     document.getElementById('eu_role')?.value || users[i].role,
  };
  DB.setUsers(users);
  const session = getSession();
  if (getUserId(session) === getUserId(users[i])) { DB.setSession({...session, ...users[i]}); renderUserCard(); }
  closePopup(); switchAdminTab('usuarios');
  showToast('Usuário atualizado! ✅');
}

function saveAdminUserPhoto(i) {
  const result = UZ_STATE['admin-user-photo-'+i];
  if (!result?.dataUrl) return showToast('Selecione uma imagem.');
  const users = DB.getUsers();
  users[i].photo = result.dataUrl;
  DB.setUsers(users);
  uzClear('admin-user-photo-'+i);
  const session = getSession();
  if (getUserId(session) === getUserId(users[i])) { session.photo = result.dataUrl; DB.setSession(session); renderUserCard(); }
  showToast('Foto salva! 📷');
  editUserTab = 'foto';
  renderEditUserPopup(i);
}

function removeAdminUserPhoto(i) {
  const users = DB.getUsers();
  delete users[i].photo;
  DB.setUsers(users);
  const session = getSession();
  if (getUserId(session) === getUserId(users[i])) { delete session.photo; DB.setSession(session); renderUserCard(); }
  showToast('Foto removida.');
  editUserTab = 'foto';
  renderEditUserPopup(i);
}

function removeUser(i) {
  if (!confirm('Remover este usuário?')) return;
  const users = DB.getUsers();
  users.splice(i, 1);
  DB.setUsers(users);
  switchAdminTab('usuarios');
  showToast('Usuário removido.');
}

function toggleGoalTarget() {
  const scope = document.getElementById('goalScope')?.value;
  const deptWrap = document.getElementById('goalDeptWrap');
  const userWrap = document.getElementById('goalUserWrap');
  if (!deptWrap || !userWrap) return;
  deptWrap.style.display = scope === 'individual' ? 'none' : '';
  userWrap.style.display = scope === 'individual' ? '' : 'none';
}

function addGoal() {
  const name = document.getElementById('goalName').value.trim();
  if (!name) return showToast('Informe o nome da meta.');
  const scope = document.getElementById('goalScope')?.value || 'equipe';

function showAddLessonForm(ti, li) {
  document.getElementById(`lesson-form-${li}`).style.display = 'block';
}
function hideAddLessonForm(li) {
  document.getElementById(`lesson-form-${li}`).style.display = 'none';
}
function updateLessonUrlLabel(li) {
  const type = document.getElementById(`lf_type_${li}`)?.value;
  const labels = { video:'URL do vídeo (YouTube, Vimeo ou MP4)', image:'URL da imagem', pdf:'URL do PDF', slides:'URL do Google Slides', podcast:'URL do podcast (Spotify ou MP3)', link:'URL do link externo', text:'(nenhum link necessário)' };
  const lbl = document.getElementById(`lf_url_label_${li}`);
  if (lbl) lbl.textContent = labels[type] || 'URL';
}

function addLesson(trackIdx, li) {
  const title = document.getElementById(`lf_title_${li}`)?.value.trim();
  if (!title) return showToast('Informe o título da aula.');
  const tracks = DB.getTracks();
  if (!tracks[trackIdx].levels[li].lessons) tracks[trackIdx].levels[li].lessons = [];
  const uploadId = `lesson-${li}`;
  const url  = uzGetUrl(uploadId, `lf_url_${li}`);
  const type = uzGetType(uploadId, `lf_type_${li}`);
  tracks[trackIdx].levels[li].lessons.push({
    title,
    type,
    url,
    duration:    document.getElementById(`lf_dur_${li}`)?.value.trim() || '',
    description: document.getElementById(`lf_desc_${li}`)?.value.trim() || '',
  });
  DB.setTracks(tracks);
  uzClear(uploadId);
  showToast('Aula adicionada! ✅');
  editTrack(trackIdx);
}

function removeLesson(trackIdx, li, lsi) {
  if (!confirm('Remover esta aula? O progresso dos alunos nela será mantido no banco.')) return;
  const tracks = DB.getTracks();
  if (tracks[trackIdx].levels[li].lessons) tracks[trackIdx].levels[li].lessons.splice(lsi, 1);
  DB.setTracks(tracks);
  showToast('Aula removida.');
  editTrack(trackIdx);
}

function saveEditTrack(i) {
  const tracks = DB.getTracks();
  tracks[i].name = document.getElementById('et_name').value;
  tracks[i].emoji = document.getElementById('et_emoji').value;
  tracks[i].levels.forEach((lv, li) => {
    lv.challenge = document.getElementById('et_ch_'+li)?.value || '';
    lv.task      = document.getElementById('et_task_'+li)?.value || '';
    lv.badge     = document.getElementById('et_badge_'+li)?.value || '';
    // lessons já foram salvas por addLesson individualmente
  });
  DB.setTracks(tracks); closePopup(); switchAdminTab('universidade');
  showToast('Trilha atualizada! ✅');
}

function removeTrack(i) {
  if (!confirm('Remover esta trilha?')) return;
  const tracks = DB.getTracks();
  tracks.splice(i, 1);
  DB.setTracks(tracks); switchAdminTab('universidade');
  showToast('Trilha removida.');
}

  cultura:    { getter:'getCulture',    setter:'setCulture' },
  mural:      { getter:'getMural',      setter:'setMural' },
};

function showAddContentPopup(section) {
  showPopup(`<h3>📄 Novo Item</h3>
    <div class="form-group"><label>Título *</label><input class="form-input" id="nc_title" placeholder="Título"></div>
    <div class="form-group" style="margin-top:6px"><label>Conteúdo</label><textarea class="form-textarea" id="nc_body" placeholder="Conteúdo..." style="min-height:90px"></textarea></div>
    <div style="margin-top:14px;display:flex;gap:6px">
      <button class="btn btn-primary" onclick="addContent('${section}')">✅ Criar</button>
      <button class="btn btn-outline" onclick="closePopup()">Cancelar</button>
    </div>`);
}

function addContent(section) {
  const title = document.getElementById('nc_title').value.trim();
  if (!title) return showToast('Informe o título.');
  const m = CONTENT_MAP[section];
  if (!m) return;
  const items = DB[m.getter]();
  items.push({ title, body: document.getElementById('nc_body').value });
  DB[m.setter](items);
  closePopup();
  switchAdminTab('conteudo');
  showToast('Item criado! ✅');
}

function removeContent(section, i) {
  const m = CONTENT_MAP[section];
  if (!m) return;
  const items = DB[m.getter]();
  items.splice(i, 1);
  DB[m.setter](items);
  if (section === 'mural') switchAdminTab('mural');
  else switchAdminTab('conteudo');
  showToast('Item removido.');
}

function changeAdminPass() {
  const p1 = document.getElementById('newAdminPass').value;
  const p2 = document.getElementById('newAdminPassConfirm').value;
  if (!p1) return showToast('Digite a nova senha.');
  if (p1 !== p2) return showToast('As senhas não coincidem.');
  if (p1.length < 4) return showToast('Senha deve ter ao menos 4 caracteres.');
  DB.set('adminPass', p1);
  showToast('Senha alterada com sucesso! ✅');
}

let profileTab = 'dados';

function showUserProfile() {

    </div>

    <div style="margin-top:14px;display:flex;gap:6px">
      <button class="btn btn-primary" onclick="saveProfilePhoto()">📷 Salvar Foto</button>
      ${u.photo ? `<button class="btn btn-danger" onclick="removeProfilePhoto()">🗑️ Remover Foto</button>` : ''}

function saveProfilePhoto() {
  const result = UZ_STATE['profile-photo'];
  if (!result?.dataUrl) return showToast('Selecione uma imagem primeiro.');
  const session = DB.getSession();
  session.photo = result.dataUrl;
  DB.setSession(session);
  // Sync users list
  const users = DB.getUsers();
  const uid = getUserId(session);
  const idx = users.findIndex(u => getUserId(u) === uid);
  if (idx >= 0) { users[idx].photo = result.dataUrl; DB.setUsers(users); }
  uzClear('profile-photo');
  renderUserCard();
  showToast('Foto salva! 📷');
  profileTab = 'foto';
  renderProfilePopup();
}

function removeProfilePhoto() {
  const session = DB.getSession();
  delete session.photo;
  DB.setSession(session);
  const users = DB.getUsers();
  const uid = getUserId(session);
  const idx = users.findIndex(u => getUserId(u) === uid);
  if (idx >= 0) { delete users[idx].photo; DB.setUsers(users); }
  renderUserCard();
  showToast('Foto removida.');
  profileTab = 'foto';
  renderProfilePopup();
}

function saveUserProfile() {
  const session = DB.getSession();
  session.name = document.getElementById('up_name').value.trim() || session.name;
  session.cargo = document.getElementById('up_cargo').value.trim();
  session.email = document.getElementById('up_email').value.trim();
  session.whatsapp = document.getElementById('up_whatsapp').value.trim();
  session.dept = document.getElementById('up_dept').value;
  DB.setSession(session);
  // Sync com users list
  const users = DB.getUsers();
  const idx = users.findIndex(u => u.name === session.name || (u.email && u.email === session.email));
  if (idx >= 0) { users[idx] = { ...users[idx], ...session }; DB.setUsers(users); }
  renderUserCard();
  closePopup();
  showToast('Perfil atualizado! ✅');
}

function handleSearch(q) {
  if (!q || q.length < 2) { goHome(); return; }
  hideAll(); showEl('searchView'); setNav('');
  setBreadcrumb([
    { label:'Início', emoji:'🏠', action:'goHome()' },
    { label:`Busca: "${q}"` },
  ]);
  const lq = q.toLowerCase();
  const results = [];
  const searchIn = (items, modName) => {
    (items||[]).forEach(it => {
      if ((it.title + ' ' + (it.body||'')).toLowerCase().includes(lq))
        results.push({ title:it.title, desc:(it.body||'').slice(0,70), mod:modName });
    });
  };
  searchIn(DB.getOnboarding(), 'Onboarding');
  searchIn(DB.getPlaybooks(), 'Playbooks');
  searchIn(DB.getCulture(), 'Cultura');
  searchIn(DB.getMural(), 'Mural');
  DB.getFaqCats().forEach(c => c.items.forEach(f => {
    if ((f.q+' '+f.a).toLowerCase().includes(lq))
      results.push({ title:f.q, desc:f.a.slice(0,70), mod:'FAQ · '+c.name });
  }));
  DB.getTracks().forEach(t => t.levels.forEach(lv => {
    if ((t.name+' '+(lv.items||[]).join(' ')).toLowerCase().includes(lq))
      results.push({ title:t.name+' — '+lv.level, desc:(lv.items||[]).join(', ').slice(0,70), mod:'Universidade' });
  }));
  DB.getComms().forEach(c => {
    if ((c.title+' '+c.body).toLowerCase().includes(lq))
      results.push({ title:c.title, desc:c.body.slice(0,70), mod:'Comunicação' });
  });

  let h = backBtn + `<p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px"><strong>${results.length}</strong> resultado(s) para "<strong>${q}</strong>"</p>`;
  if (!results.length) h += emptyState('🔍', 'Nenhum resultado encontrado para essa busca.');
  else h += results.map(r => `<div class="card" style="cursor:default"><div class="card-info"><h4>${r.title}</h4><p>${r.desc}… · <span class="tag tag-grey">${r.mod}</span></p></div></div>`).join('');
  document.getElementById('searchView').innerHTML = h;
}

// ══════════════════════════
//  SISTEMA DE UPLOAD DE ARQUIVOS
//  Converte para base64 e salva no localStorage
// ══════════════════════════

// Mapa de extensões → tipo de mídia
const EXT_TYPE_MAP = {
  // Vídeo
  mp4:'video', webm:'video', mov:'video', avi:'video',
  // Imagem
  jpg:'image', jpeg:'image', png:'image', gif:'image', webp:'image', svg:'image',
  // PDF
  pdf:'pdf',
  // Slides
  ppt:'slides', pptx:'slides',
  // Áudio / Podcast
  mp3:'podcast', wav:'podcast', ogg:'podcast', m4a:'podcast', aac:'podcast',
};

const FILE_SIZE_LIMIT_MB = 15; // localStorage tem ~5-10MB; avisar se > 5MB

function getFileType(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  return EXT_TYPE_MAP[ext] || 'link';
}

function getFileIcon(type) {
  const icons = { video:'▶️', image:'🖼️', pdf:'📑', slides:'📊', podcast:'🎙️', link:'🔗', text:'📄' };
  return icons[type] || '📎';
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

// Lê arquivo e retorna Promise<{dataUrl, type, name, size}>
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    if (file.size > FILE_SIZE_LIMIT_MB * 1024 * 1024) {
      reject(new Error(`Arquivo muito grande (${formatBytes(file.size)}). Limite: ${FILE_SIZE_LIMIT_MB}MB. Use um link externo para arquivos maiores.`));
      return;
    }
    const reader = new FileReader();
    reader.onload = e => resolve({ dataUrl: e.target.result, type: getFileType(file), name: file.name, size: file.size });
    reader.onerror = () => reject(new Error('Erro ao ler o arquivo.'));
    reader.readAsDataURL(file);
  });
}

// Renderiza zona de upload reutilizável
// id: identificador único, accept: tipos aceitos, onUpload: callback(result)
function renderUploadZone(id, accept, hint) {
  return `
  <div class="url-or-upload"><span>ou faça upload do arquivo</span></div>
  <div class="upload-zone" id="uz-${id}"
    ondragover="uzDragOver(event,'${id}')"
    ondragleave="uzDragLeave('${id}')"
    ondrop="uzDrop(event,'${id}')">
    <input type="file" accept="${accept}" onchange="uzFileChange(event,'${id}')">
    <div class="upload-zone-icon">📁</div>
    <div class="upload-zone-text"><strong>Clique para selecionar</strong> ou arraste aqui<br>${hint}</div>
  </div>
  <div id="uz-preview-${id}" style="display:none"></div>`;
}

// Estado temporário de uploads pendentes
const UZ_STATE = {};

function uzDragOver(e, id) {
  e.preventDefault();
  document.getElementById('uz-'+id)?.classList.add('drag-over');
}
function uzDragLeave(id) {
  document.getElementById('uz-'+id)?.classList.remove('drag-over');
}
function uzDrop(e, id) {
  e.preventDefault();
  uzDragLeave(id);
  const file = e.dataTransfer?.files?.[0];
  if (file) uzProcess(id, file);
}
function uzFileChange(e, id) {
  const file = e.target.files?.[0];
  if (file) uzProcess(id, file);
}

async function uzProcess(id, file) {
  const previewEl = document.getElementById('uz-preview-'+id);
  const zoneEl = document.getElementById('uz-'+id);
  if (!previewEl || !zoneEl) return;

  // Show loading
  previewEl.style.display = 'block';
  previewEl.innerHTML = `<div class="upload-progress"><div class="upload-progress-bar" id="uzpb-${id}" style="width:30%"></div></div><div style="font-size:10.5px;color:var(--text-dim);margin-top:4px">Carregando ${file.name}…</div>`;

  // Simulate progress
  let pct = 30;
  const timer = setInterval(() => { pct = Math.min(pct + 20, 85); const pb = document.getElementById('uzpb-'+id); if(pb) pb.style.width = pct+'%'; }, 200);

  try {
    const result = await readFileAsDataURL(file);
    clearInterval(timer);
    UZ_STATE[id] = result;
    const icon = getFileIcon(result.type);
    previewEl.innerHTML = `<div class="upload-preview">
      <span class="up-icon">${icon}</span>
      <span class="up-name">${result.name}</span>
      <span class="up-size">${formatBytes(result.size)}</span>
      <span class="up-remove" onclick="uzClear('${id}')" title="Remover">✕</span>
    </div>`;
    // Auto-preencher o campo de tipo se existir
    const typeId = id.replace('uz-', 'lf_type_').replace('upload-', 'lf_type_');
    const typeEl = document.getElementById(typeId);
    if (typeEl) { typeEl.value = result.type; updateLessonUrlLabel(typeId.replace('lf_type_','')); }
    // Limpar campo URL se existir
    const urlId = id.replace('uz-', 'lf_url_').replace('upload-', '');
    const urlEl = document.getElementById(urlId);
    if (urlEl) urlEl.value = '';
  } catch(err) {
    clearInterval(timer);
    UZ_STATE[id] = null;
    previewEl.innerHTML = `<div style="font-size:11px;color:var(--red);padding:6px">${err.message}</div>`;
  }
}

function uzClear(id) {
  UZ_STATE[id] = null;
  const previewEl = document.getElementById('uz-preview-'+id);
  if (previewEl) previewEl.style.display = 'none';
  // Reset file input
  const zone = document.getElementById('uz-'+id);
  if (zone) { const inp = zone.querySelector('input'); if(inp) inp.value = ''; }
}

// Retorna a URL final: base64 do upload ou URL manual
function uzGetUrl(id, urlInputId) {
  if (UZ_STATE[id]?.dataUrl) return UZ_STATE[id].dataUrl;
  const el = document.getElementById(urlInputId);
  return el ? el.value.trim() : '';
}

function uzGetType(id, typeInputId) {
  if (UZ_STATE[id]?.type) return UZ_STATE[id].type;
  const el = document.getElementById(typeInputId);
  return el ? el.value : 'link';
}

// ══════════════════════════
//  BACKUP / EXPORTAR DADOS
//  Garante que conteúdos não se percam entre versões
// ══════════════════════════
function exportData() {
  const keys = ['identity','users','org','comms','tracks','faqcats','playbooks','onboarding','culture','mural','goals','adminPass'];
  const backup = {};
  keys.forEach(k => { const v = DB.get(k, null); if (v !== null) backup[k] = v; });

  // Export per-user data: permissions and progress
  const users = DB.getUsers();
  users.forEach(u => {
    const uid = getUserId(u);
    const perms = DB.getUserPerms(uid);
    if (perms !== null) backup['perms_' + uid] = perms;
    const prog = DB.getProgress(uid);
    if (prog && Object.keys(prog).length > 0) backup['prog_' + uid] = prog;
    // Also export achievements, points and streak
    const ach = DB.get('achievements_' + uid, null);
    if (ach) backup['achievements_' + uid] = ach;
    const pts = DB.get('points_' + uid, null);
    if (pts) backup['points_' + uid] = pts;
    const streak = DB.get('streak_' + uid, null);
    if (streak) backup['streak_' + uid] = streak;
  });

  const json = JSON.stringify(backup, null, 2);
  const sizeKB = Math.round(json.length / 1024);
  const sizeMB = (sizeKB / 1024).toFixed(1);
  if (sizeKB > 4000) showToast(`⚠️ Backup grande (${sizeMB}MB). Arquivos em base64 consomem espaço.`);

  const blob = new Blob([json], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'piper-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  showToast(`💾 Backup exportado! (${sizeKB > 1024 ? sizeMB+'MB' : sizeKB+'KB'})`);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      Object.keys(data).forEach(k => DB.set(k, data[k]));
      showToast('✅ Dados importados com sucesso!');
      setTimeout(() => location.reload(), 1200);
    } catch {
      showToast('❌ Arquivo inválido. Tente novamente.');
    }
  };
  reader.readAsText(file);
}

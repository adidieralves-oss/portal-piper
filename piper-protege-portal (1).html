<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piper Protege — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,500;6..12,600;6..12,700;6..12,800;6..12,900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   PIPER PROTEGE PORTAL v9 — SISTEMA COMPLETO
   ═══════════════════════════════════════════════ */
:root {
  --primary: #01023B;
  --secondary: #09F289;
  --accent: #FF3D02;
  --accent2: #2F06CC;
  --accent3: #FFB800;
  --grey: #A1B5CE;
  --grey-dim: #7B8FA8;
  --grey-faint: rgba(161,181,206,.07);
  --border: rgba(161,181,206,.09);
  --border-hover: rgba(161,181,206,.2);
  --bg-base: #010225;
  --bg-card: rgba(10,14,82,.4);
  --bg-card-hover: rgba(13,17,96,.5);
  --text-primary: #E8EDF3;
  --text-secondary: #9AABC0;
  --text-dim: #6B7FA0;
  --red: #EF4444;
  --yellow: #F59E0B;
  --green: #10B981;
  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --ease: cubic-bezier(.16,1,.3,1);
  --tr: .3s var(--ease);
  --tf: .15s var(--ease);
  --sidebar-w: 256px;
  --topbar-h: 52px;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { font-family:'Nunito Sans',-apple-system,sans-serif; background:var(--bg-base); color:var(--text-primary); line-height:1.6; overflow-x:hidden; -webkit-font-smoothing:antialiased; }
::selection { background:rgba(9,242,137,.2); color:#fff; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(161,181,206,.12); border-radius:10px; }
a { text-decoration:none; color:inherit; }
button { font-family:inherit; }
input,select,textarea { font-family:inherit; }

/* ══ TOAST ══ */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:rgba(10,14,82,.95); border:1px solid var(--border-hover); color:var(--text-primary); padding:9px 18px; border-radius:var(--radius-sm); font-size:12px; font-weight:600; z-index:9999; transition:transform .4s var(--ease),opacity .4s; opacity:0; pointer-events:none; display:flex; align-items:center; gap:7px; white-space:nowrap; backdrop-filter:blur(12px); }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* ══ BREADCRUMB ══ */
.breadcrumb { display:flex; align-items:center; gap:5px; padding:8px 0 14px; flex-wrap:wrap; }
.breadcrumb-item { font-size:11px; color:var(--text-dim); cursor:pointer; transition:color var(--tf); display:flex; align-items:center; gap:5px; }
.breadcrumb-item:hover { color:var(--secondary); }
.breadcrumb-item.current { color:var(--text-primary); font-weight:700; cursor:default; }
.breadcrumb-sep { font-size:10px; color:var(--border-hover); }
.page-title-bar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.page-title-bar h1 { font-size:18px; font-weight:800; line-height:1.2; }
.page-title-bar .page-subtitle { font-size:11.5px; color:var(--text-dim); margin-top:2px; }

/* ══ GAMIFICAÇÃO ══ */
.achievement-pop { position:fixed; bottom:80px; right:24px; z-index:9998; animation:achievePop .5s var(--ease); }
@keyframes achievePop { from { opacity:0; transform:translateY(20px) scale(.9); } 60% { transform:translateY(-4px) scale(1.02); } to { opacity:1; transform:translateY(0) scale(1); } }
.achievement-card-pop { background:linear-gradient(135deg,rgba(10,14,82,.98),rgba(15,20,100,.98)); border:1px solid rgba(9,242,137,.3); border-radius:var(--radius); padding:14px 18px; display:flex; align-items:center; gap:12px; min-width:260px; box-shadow:0 8px 32px rgba(0,0,0,.5); }
.achievement-icon-pop { font-size:28px; flex-shrink:0; }
.achievement-info-pop strong { font-size:13px; color:var(--secondary); display:block; }
.achievement-info-pop span { font-size:11px; color:var(--text-secondary); }

.achievement-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:20px; font-size:10px; font-weight:700; border:1px solid; }
.achievement-badge.earned { background:rgba(9,242,137,.08); border-color:rgba(9,242,137,.2); color:var(--secondary); }
.achievement-badge.locked { background:var(--grey-faint); border-color:var(--border); color:var(--text-dim); opacity:.6; }

.ranking-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; transition:border-color var(--tf); }
.ranking-card:hover { border-color:var(--border-hover); }
.ranking-pos { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; flex-shrink:0; }
.ranking-pos.gold { background:rgba(255,184,0,.15); color:var(--accent3); border:1px solid rgba(255,184,0,.3); }
.ranking-pos.silver { background:rgba(161,181,206,.12); color:#A0AEC0; border:1px solid rgba(161,181,206,.2); }
.ranking-pos.bronze { background:rgba(205,127,50,.12); color:#C97429; border:1px solid rgba(205,127,50,.2); }
.ranking-pos.other { background:var(--grey-faint); color:var(--text-dim); border:1px solid var(--border); }
.ranking-info { flex:1; }
.ranking-name { font-size:12.5px; font-weight:700; }
.ranking-meta { font-size:10.5px; color:var(--text-dim); }
.ranking-score { font-size:16px; font-weight:900; color:var(--secondary); font-family:'Space Grotesk',sans-serif; }

/* ══ CONTINUE BUTTON ══ */
.continue-btn { display:flex; align-items:center; gap:10px; padding:13px 18px; background:linear-gradient(135deg,rgba(9,242,137,.1),rgba(47,6,204,.1)); border:1px solid rgba(9,242,137,.2); border-radius:var(--radius); cursor:pointer; transition:all var(--tr); margin-bottom:14px; width:100%; text-align:left; color:var(--text-primary); font-family:inherit; }
.continue-btn:hover { border-color:rgba(9,242,137,.4); transform:translateY(-1px); }
.continue-btn-icon { font-size:22px; flex-shrink:0; }
.continue-btn-label { font-size:10px; color:var(--secondary); text-transform:uppercase; letter-spacing:1.5px; font-weight:700; }
.continue-btn-title { font-size:13px; font-weight:800; margin-top:1px; }
.continue-btn-meta { font-size:10.5px; color:var(--text-dim); margin-top:1px; }
.continue-btn-arrow { margin-left:auto; font-size:18px; color:var(--secondary); flex-shrink:0; }

/* ══ TRACK PROGRESS OVERVIEW ══ */
.track-progress-bar { height:6px; border-radius:3px; background:var(--border); overflow:hidden; margin-top:4px; }
.track-progress-fill { height:100%; border-radius:3px; transition:width .6s var(--ease); }
.track-overview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; margin-bottom:16px; }
.track-overview-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; cursor:pointer; transition:all var(--tf); }
.track-overview-card:hover { border-color:var(--border-hover); transform:translateY(-1px); }
.track-overview-card.complete { border-color:rgba(9,242,137,.25); background:rgba(9,242,137,.04); }

/* ══ POPUP ══ */
.popup-overlay { position:fixed; inset:0; background:rgba(1,2,37,.8); backdrop-filter:blur(8px); z-index:8000; display:none; align-items:center; justify-content:center; padding:16px; }
.popup-overlay.show { display:flex; }
.popup-box { background:#020437; border:1px solid var(--border-hover); border-radius:var(--radius); padding:28px; width:100%; max-width:560px; max-height:85vh; overflow-y:auto; animation:popIn .3s var(--ease); }
.popup-box h3 { font-size:15px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:7px; }
@keyframes popIn { from { opacity:0; transform:scale(.94) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }

/* ══ LOGIN SCREEN ══ */
#loginScreen { position:fixed; inset:0; background:var(--bg-base); z-index:10000; display:flex; align-items:center; justify-content:center; }
.login-bg { position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(9,242,137,.06) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 100%, rgba(47,6,204,.08) 0%, transparent 60%); }
.login-card { position:relative; z-index:1; background:var(--bg-card); border:1px solid var(--border-hover); border-radius:20px; padding:40px 36px; width:100%; max-width:400px; text-align:center; animation:popIn .5s var(--ease); }
.login-logo { width:56px; height:56px; border-radius:14px; background:linear-gradient(135deg,var(--accent2),var(--secondary)); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:22px; }
.login-card h2 { font-size:20px; font-weight:800; margin-bottom:4px; }
.login-card p { font-size:12px; color:var(--text-dim); margin-bottom:24px; }
.login-users { display:flex; flex-direction:column; gap:6px; margin-bottom:20px; }
.login-user-btn { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--grey-faint); border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; transition:all var(--tf); color:var(--text-primary); text-align:left; }
.login-user-btn:hover { border-color:var(--border-hover); background:var(--bg-card-hover); }
.login-user-btn .lu-avatar { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; flex-shrink:0; }
.login-user-btn .lu-info { flex:1; }
.login-user-btn .lu-name { font-size:12px; font-weight:700; line-height:1.2; }
.login-user-btn .lu-role { font-size:10px; color:var(--text-dim); }
.login-divider { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; margin:16px 0 10px; text-align:center; }
.login-form { text-align:left; }

/* ══ SIDEBAR ══ */
.sidebar { position:fixed; top:0; left:0; width:var(--sidebar-w); height:100vh; background:rgba(1,3,44,.97); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:200; transition:transform var(--tr),width var(--tr); backdrop-filter:blur(20px); }
.sidebar.collapsed { width:64px; }
.sidebar-header { padding:16px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; min-height:60px; overflow:hidden; }
.logo-icon { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,var(--accent2),var(--secondary)); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px; }
.logo-text { overflow:hidden; transition:opacity var(--tf),width var(--tf); }
.logo-text .brand { font-weight:800; font-size:13px; white-space:nowrap; }
.logo-text .sub { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); font-weight:600; }
.sidebar.collapsed .logo-text { opacity:0; width:0; }
.sidebar-collapse-btn { margin-left:auto; flex-shrink:0; width:24px; height:24px; background:var(--grey-faint); border:1px solid var(--border); border-radius:6px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-dim); transition:all var(--tf); }
.sidebar-collapse-btn:hover { color:var(--text-primary); border-color:var(--border-hover); }
.sidebar-collapse-btn svg { width:12px; height:12px; transition:transform var(--tr); }
.sidebar.collapsed .sidebar-collapse-btn svg { transform:rotate(180deg); }
.user-card { margin:8px; padding:8px 10px; background:var(--grey-faint); border-radius:var(--radius-sm); border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; gap:8px; transition:all var(--tf); min-height:42px; overflow:hidden; }
.user-card:hover { border-color:var(--border-hover); }
.user-avatar { width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; flex-shrink:0; color:#fff; }
.user-card-info { overflow:hidden; transition:opacity var(--tf); }
.user-card-name { font-size:11.5px; font-weight:700; white-space:nowrap; }
.user-card-role { font-size:9.5px; color:var(--text-dim); }
.sidebar.collapsed .user-card-info { opacity:0; width:0; }
.sidebar-nav { flex:1; overflow-y:auto; overflow-x:hidden; padding:4px 6px; }
.nav-group { margin-bottom:4px; }
.nav-group-header { display:flex; align-items:center; justify-content:space-between; padding:12px 10px 4px; cursor:pointer; }
.nav-label { font-size:8.5px; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); font-weight:700; white-space:nowrap; overflow:hidden; transition:opacity var(--tf); }
.sidebar.collapsed .nav-label { opacity:0; }
.nav-group-chevron { width:12px; height:12px; color:var(--text-dim); transition:transform var(--tr); flex-shrink:0; }
.nav-group.collapsed .nav-group-chevron { transform:rotate(-90deg); }
.sidebar.collapsed .nav-group-chevron { display:none; }
.nav-group-items { overflow:hidden; transition:max-height var(--tr); }
.nav-group.collapsed .nav-group-items { max-height:0 !important; }
.nav-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:var(--radius-sm); color:var(--text-secondary); font-size:12px; font-weight:500; cursor:pointer; transition:all var(--tf); border:1px solid transparent; background:none; width:100%; text-align:left; position:relative; white-space:nowrap; overflow:hidden; }
.nav-item:hover { background:var(--grey-faint); color:var(--text-primary); border-color:var(--border); }
.nav-item.active { background:rgba(9,242,137,.07); color:var(--secondary); border-color:rgba(9,242,137,.14); }
.nav-emoji { font-size:14px; flex-shrink:0; line-height:1; width:18px; text-align:center; }
.nav-item-label { overflow:hidden; transition:opacity var(--tf),max-width var(--tr); max-width:200px; }
.sidebar.collapsed .nav-item-label { opacity:0; max-width:0; }
.nav-badge { margin-left:auto; background:var(--red); color:#fff; font-size:8px; font-weight:800; min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 4px; flex-shrink:0; }
.sidebar.collapsed .nav-badge { position:absolute; top:3px; right:3px; min-width:12px; height:12px; font-size:7px; }
.sidebar-foot { padding:10px 12px; border-top:1px solid var(--border); overflow:hidden; }
.sidebar-foot-text { font-size:9px; color:var(--text-dim); text-align:center; white-space:nowrap; transition:opacity var(--tf); }
.sidebar.collapsed .sidebar-foot-text { opacity:0; }
.logout-btn { display:flex; align-items:center; gap:6px; padding:7px 10px; border-radius:var(--radius-sm); color:var(--text-dim); font-size:11px; font-weight:500; cursor:pointer; transition:all var(--tf); border:1px solid transparent; background:none; width:100%; margin-bottom:6px; white-space:nowrap; overflow:hidden; }
.logout-btn:hover { color:var(--red); border-color:rgba(239,68,68,.2); background:rgba(239,68,68,.04); }
.sidebar.collapsed .logout-btn span { display:none; }

/* ══ MAIN ══ */
.main { margin-left:var(--sidebar-w); min-height:100vh; transition:margin-left var(--tr); }
.main.expanded { margin-left:64px; }

/* ══ TOPBAR ══ */
.topbar { position:sticky; top:0; z-index:100; background:rgba(1,2,59,.8); backdrop-filter:blur(24px); border-bottom:1px solid var(--border); padding:0 20px; height:var(--topbar-h); display:flex; align-items:center; justify-content:space-between; gap:12px; }
.search-wrap { position:relative; width:280px; flex-shrink:1; }
.search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); width:13px; height:13px; color:var(--text-dim); pointer-events:none; }
.search-wrap input { width:100%; padding:7px 12px 7px 30px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:12px; background:var(--grey-faint); color:var(--text-primary); transition:border-color var(--tf); }
.search-wrap input:focus { outline:none; border-color:rgba(9,242,137,.3); }
.search-wrap input::placeholder { color:var(--text-dim); }
.topbar-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.topbar-date { font-size:10px; color:var(--text-dim); white-space:nowrap; }
.tb-btn { background:var(--grey-faint); border:1px solid var(--border); border-radius:var(--radius-xs); width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-dim); transition:all var(--tf); position:relative; }
.tb-btn:hover { border-color:var(--border-hover); color:var(--text-primary); }
.tb-btn svg { width:13px; height:13px; }
.avatar { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:800; cursor:pointer; }
.hamburger { display:none; background:none; border:none; cursor:pointer; color:var(--text-secondary); padding:4px; }
.sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(1,2,37,.7); backdrop-filter:blur(4px); z-index:150; }
.sidebar-overlay.show { display:block; }

/* ══ CONTENT ══ */
.content { padding:20px 24px 60px; max-width:1100px; }
.view-section { display:none; animation:fadeIn .35s var(--ease); }
.view-section.active { display:block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ══ HERO ══ */
.hero { position:relative; border-radius:var(--radius); padding:44px 32px 32px; margin-bottom:20px; overflow:hidden; border:1px solid var(--border); background-color:var(--primary); background-size:cover; background-position:center 35%; min-height:220px; display:flex; align-items:flex-end; }
.hero-overlay { position:absolute; inset:0; background:linear-gradient(180deg,rgba(1,2,59,.15) 0%,rgba(1,2,59,.5) 40%,rgba(1,2,59,.95) 100%); z-index:1; }
.hero-content { position:relative; z-index:2; }
.hero-logo { width:64px; height:auto; margin-bottom:10px; opacity:.95; filter:drop-shadow(0 2px 8px rgba(0,0,0,.4)); border-radius:10px; }
.hero-tag { display:inline-flex; align-items:center; gap:5px; font-size:9px; text-transform:uppercase; letter-spacing:2.5px; color:var(--secondary); font-weight:700; margin-bottom:6px; opacity:.85; }
.hero h1 { font-size:22px; font-weight:300; margin-bottom:4px; color:#fff; line-height:1.3; }
.hero h1 strong { font-weight:800; }
.hero p { font-size:12px; color:rgba(255,255,255,.6); max-width:400px; line-height:1.7; }
.continuum-line { position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--secondary),var(--accent2),var(--accent),transparent); opacity:.5; z-index:3; }

/* ══ SECTIONS ══ */
.section-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:14px; }
.section-head-left { display:flex; align-items:center; gap:8px; }
.section-head-left::before { content:''; width:3px; height:14px; border-radius:2px; background:linear-gradient(180deg,var(--secondary),var(--accent2)); flex-shrink:0; }
.section-head h2 { font-size:13px; font-weight:800; }

/* ══ MODULE CARDS ══ */
.modules { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); gap:9px; margin-bottom:24px; }
.mod-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 16px; cursor:pointer; transition:all var(--tr); color:var(--text-primary); display:flex; flex-direction:column; gap:7px; }
.mod-card:hover { border-color:var(--border-hover); background:var(--bg-card-hover); transform:translateY(-2px); }
.mod-emoji { font-size:24px; line-height:1; }
.mod-card h3 { font-size:12.5px; font-weight:800; }
.mod-card p { font-size:10.5px; color:var(--text-secondary); line-height:1.5; }
.mod-card .mod-badge { margin-top:auto; }

/* ══ BACK ══ */
.back-btn { display:inline-flex; align-items:center; gap:5px; background:none; border:none; color:var(--text-secondary); font-size:12px; font-family:inherit; font-weight:600; cursor:pointer; margin-bottom:16px; padding:2px 0; transition:color var(--tf); }
.back-btn:hover { color:var(--secondary); }
.back-btn svg { width:13px; height:13px; }

/* ══ CARDS ══ */
.card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:7px; cursor:pointer; transition:all var(--tf); display:flex; align-items:flex-start; gap:10px; }
.card:hover { border-color:var(--border-hover); background:var(--bg-card-hover); }
.card-info { flex:1; min-width:0; }
.card-info h4 { font-size:12.5px; font-weight:700; margin-bottom:2px; }
.card-info p { font-size:10.5px; color:var(--text-secondary); line-height:1.5; }

/* ══ FORMS ══ */
.admin-section { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
.admin-section h3 { font-size:13px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:7px; }
.form-row { display:flex; gap:7px; margin-bottom:7px; flex-wrap:wrap; align-items:flex-end; }
.form-group { display:flex; flex-direction:column; gap:3px; flex:1; min-width:120px; }
.form-group label { font-size:9.5px; color:var(--text-dim); font-weight:700; text-transform:uppercase; letter-spacing:1px; }
.form-input,.form-select,.form-textarea { padding:8px 11px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:12px; background:var(--grey-faint); color:var(--text-primary); width:100%; transition:border-color var(--tf); }
.form-input:focus,.form-select:focus,.form-textarea:focus { outline:none; border-color:rgba(9,242,137,.35); }
.form-select option { background:#020437; }
.form-textarea { resize:vertical; min-height:70px; line-height:1.6; }
.btn { padding:7px 16px; border-radius:var(--radius-sm); font-size:11.5px; font-weight:700; cursor:pointer; transition:all var(--tf); font-family:inherit; border:none; display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
.btn-primary { background:var(--secondary); color:var(--primary); }
.btn-primary:hover { opacity:.88; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text-secondary); }
.btn-outline:hover { border-color:var(--border-hover); color:var(--text-primary); }
.btn-danger { background:rgba(239,68,68,.08); color:var(--red); border:1px solid rgba(239,68,68,.18); }
.btn-danger:hover { background:rgba(239,68,68,.14); }
.btn-sm { padding:4px 10px; font-size:10.5px; }
.admin-list { margin-top:8px; }
.admin-list-item { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--grey-faint); border-radius:var(--radius-sm); margin-bottom:4px; font-size:11.5px; border:1px solid transparent; transition:border-color var(--tf); }
.admin-list-item:hover { border-color:var(--border); }
.item-actions { display:flex; gap:3px; flex-shrink:0; }

/* ══ TAGS ══ */
.tag { font-size:8.5px; padding:2px 8px; border-radius:20px; font-weight:800; letter-spacing:.3px; text-transform:uppercase; display:inline-flex; align-items:center; gap:4px; }
.tag-green { background:rgba(9,242,137,.08); color:var(--secondary); border:1px solid rgba(9,242,137,.15); }
.tag-blue { background:rgba(47,6,204,.12); color:#9B8AFF; border:1px solid rgba(47,6,204,.2); }
.tag-red { background:rgba(255,61,2,.08); color:var(--accent); border:1px solid rgba(255,61,2,.15); }
.tag-yellow { background:rgba(251,191,36,.08); color:var(--accent3); border:1px solid rgba(251,191,36,.15); }
.tag-grey { background:var(--grey-faint); color:var(--text-dim); border:1px solid var(--border); }
.tag-bar { display:flex; gap:5px; margin-bottom:12px; flex-wrap:wrap; }
.tag-btn { background:var(--grey-faint); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:10px; font-weight:600; color:var(--text-secondary); cursor:pointer; transition:all var(--tf); font-family:inherit; }
.tag-btn:hover { border-color:var(--border-hover); color:var(--text-primary); }
.tag-btn.active { background:rgba(9,242,137,.08); border-color:rgba(9,242,137,.2); color:var(--secondary); }

/* ══ FAQ ══ */
.faq-item { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:5px; overflow:hidden; transition:border-color var(--tf); }
.faq-item:hover { border-color:var(--border-hover); }
.faq-q { padding:12px 16px; cursor:pointer; font-size:12.5px; font-weight:600; display:flex; justify-content:space-between; align-items:center; gap:10px; }
.faq-q svg { width:13px; height:13px; color:var(--text-dim); transition:transform var(--tr); flex-shrink:0; }
.faq-q.open svg { transform:rotate(180deg); }
.faq-a { padding:0 16px 12px; font-size:11.5px; color:var(--text-secondary); line-height:1.7; display:none; }
.faq-a.open { display:block; }
.faq-category-section { margin-bottom:20px; }
.faq-cat-title { font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; padding:0 4px; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.faq-cat-title::before { content:''; width:12px; height:2px; background:var(--secondary); border-radius:2px; }

/* ══ FEED / COMUNICAÇÃO ══ */
.feed-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin-bottom:8px; transition:all var(--tf); }
.feed-card:hover { border-color:var(--border-hover); }
.feed-header { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.feed-author { font-size:12px; font-weight:700; }
.feed-time { font-size:10px; color:var(--text-dim); }
.feed-title { font-size:14px; font-weight:800; margin-bottom:6px; }
.feed-body { font-size:12px; color:var(--text-secondary); line-height:1.7; }
.confirm-strip { display:flex; align-items:center; gap:8px; padding:9px 13px; background:rgba(9,242,137,.04); border:1px solid rgba(9,242,137,.12); border-radius:var(--radius-sm); margin-top:10px; font-size:11px; }
.confirm-strip.done { opacity:.5; }

/* ══ STATS ══ */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:9px; margin-bottom:18px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
.stat-value { font-size:24px; font-weight:900; color:var(--secondary); line-height:1; font-family:'Space Grotesk',sans-serif; }
.stat-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-top:4px; }
.stat-sublabel { font-size:10px; color:var(--text-secondary); margin-top:2px; }

/* ══ RANKING ══ */
.ranking-table { width:100%; border-collapse:separate; border-spacing:0 3px; }
.ranking-table th { text-align:left; font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); font-weight:700; padding:4px 10px; }
.ranking-table td { padding:9px 10px; font-size:11.5px; background:var(--bg-card); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
.ranking-table td:first-child { border-left:1px solid var(--border); border-radius:var(--radius-sm) 0 0 var(--radius-sm); }
.ranking-table td:last-child { border-right:1px solid var(--border); border-radius:0 var(--radius-sm) var(--radius-sm) 0; }

/* ══ CHECKLIST / PROGRESSO ══ */
.checklist { list-style:none; padding:0; margin:10px 0; }
.checklist li { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--grey-faint); border-radius:var(--radius-sm); margin-bottom:4px; font-size:11.5px; cursor:pointer; border:1px solid transparent; transition:all var(--tf); }
.checklist li:hover { border-color:var(--border); background:var(--bg-card-hover); }
.checklist li.done { opacity:.55; }
.checklist li.done .chk { background:var(--secondary); border-color:var(--secondary); }
.checklist li.done .chk::after { content:'✓'; color:var(--primary); font-size:9px; font-weight:900; }
.checklist li.done span { text-decoration:line-through; }
.chk { width:16px; height:16px; border-radius:4px; border:2px solid var(--grey-dim); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all var(--tf); }
.progress-wrap { margin:8px 0; background:var(--grey-faint); border-radius:10px; height:5px; overflow:hidden; }
.progress-fill { height:100%; border-radius:10px; background:linear-gradient(90deg,var(--secondary),var(--accent2)); transition:width .6s var(--ease); }

/* ══ STEP BOX ══ */
.step-box { background:rgba(9,242,137,.03); border-left:2px solid var(--secondary); padding:10px 14px; border-radius:0 var(--radius-sm) var(--radius-sm) 0; margin:8px 0; }
.step-box strong { color:var(--secondary); display:block; margin-bottom:3px; font-size:11px; font-weight:800; }
.step-box p { margin:0; font-size:11.5px; color:var(--text-secondary); }

/* ══ CULTURE ══ */
.culture-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:8px; transition:border-color var(--tf); }
.culture-card:hover { border-color:var(--border-hover); }
.culture-card h4 { font-size:13px; font-weight:800; margin-bottom:4px; }
.culture-card p { font-size:12px; color:var(--text-secondary); line-height:1.7; }

/* ══ UNIVERSIDADE ══ */
.track-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; }
.track-header { padding:16px 18px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:background var(--tf); }
.track-header:hover { background:var(--bg-card-hover); }
.track-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.track-info { flex:1; }
.track-info h3 { font-size:13px; font-weight:800; margin-bottom:2px; }
.track-info p { font-size:10.5px; color:var(--text-secondary); }
.track-body { padding:0 18px 16px; border-top:1px solid var(--border); }
.level-card { margin-top:10px; background:var(--grey-faint); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; transition:opacity var(--tf); }
.level-card.locked { opacity:.45; pointer-events:none; position:relative; }
.level-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.level-badge { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; }
.level-name { font-size:12px; font-weight:700; }
.lesson-list { display:flex; flex-direction:column; gap:5px; margin:8px 0; }
.lesson-item { display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; transition:all var(--tf); }
.lesson-item:hover:not(.locked-lesson) { border-color:var(--border-hover); background:var(--bg-card-hover); }
.lesson-item.done { border-left:2px solid var(--secondary); }
.lesson-item.locked-lesson { opacity:.38; cursor:not-allowed; }
.lesson-icon { width:32px; height:32px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; background:var(--grey-faint); border:1px solid var(--border); }
.lesson-info { flex:1; min-width:0; }
.lesson-title { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lesson-meta { font-size:10px; color:var(--text-dim); margin-top:1px; }
.lesson-check { width:18px; height:18px; border-radius:5px; border:2px solid var(--grey-dim); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:10px; transition:all var(--tf); }
.lesson-item.done .lesson-check { background:var(--secondary); border-color:var(--secondary); color:var(--primary); font-weight:900; }
.level-locked-bar { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--text-dim); padding:8px 0 2px; }
.level-complete-banner { background:linear-gradient(135deg,rgba(9,242,137,.08),rgba(47,6,204,.08)); border:1px solid rgba(9,242,137,.18); border-radius:var(--radius-sm); padding:11px 14px; display:flex; align-items:center; gap:10px; margin-top:8px; }
.level-complete-banner .lcb-icon { font-size:18px; }
.level-complete-banner strong { font-size:11.5px; color:var(--secondary); }
/* Lesson modal */
.lesson-modal-overlay { position:fixed; inset:0; background:rgba(1,2,37,.93); backdrop-filter:blur(12px); z-index:9500; display:flex; align-items:center; justify-content:center; padding:16px; animation:fadeIn .2s var(--ease); }
.lesson-modal { background:#020437; border:1px solid var(--border-hover); border-radius:var(--radius); width:100%; max-width:740px; max-height:90vh; overflow-y:auto; animation:popIn .3s var(--ease); }
.lesson-modal-header { padding:18px 20px 12px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; border-bottom:1px solid var(--border); }
.lesson-modal-header h3 { font-size:15px; font-weight:800; line-height:1.3; }
.lesson-modal-close { width:30px; height:30px; background:var(--grey-faint); border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:14px; transition:all var(--tf); }
.lesson-modal-close:hover { border-color:var(--red); color:var(--red); }
.lesson-modal-body { padding:18px 20px; }
.lesson-modal-body iframe { width:100%; border:none; border-radius:var(--radius-sm); display:block; background:#000; }
.lesson-modal-body img { width:100%; border-radius:var(--radius-sm); max-height:420px; object-fit:contain; background:#000; }
.lesson-modal-body audio { width:100%; margin:10px 0; border-radius:8px; }
.lesson-modal-footer { padding:12px 20px 18px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.lesson-desc { font-size:12px; color:var(--text-secondary); line-height:1.7; margin-bottom:14px; white-space:pre-wrap; }

/* ══ UPLOAD ZONE ══ */
.upload-zone { border:2px dashed var(--border-hover); border-radius:var(--radius-sm); padding:18px 14px; text-align:center; cursor:pointer; transition:all var(--tf); background:var(--grey-faint); position:relative; }
.upload-zone:hover,.upload-zone.drag-over { border-color:var(--secondary); background:rgba(9,242,137,.04); }
.upload-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-zone-icon { font-size:22px; margin-bottom:6px; }
.upload-zone-text { font-size:11px; color:var(--text-dim); line-height:1.5; }
.upload-zone-text strong { color:var(--secondary); }
.upload-preview { margin-top:8px; display:flex; align-items:center; gap:8px; padding:8px 10px; background:rgba(9,242,137,.06); border:1px solid rgba(9,242,137,.15); border-radius:var(--radius-sm); font-size:11px; color:var(--secondary); font-weight:600; }
.upload-preview .up-icon { font-size:16px; flex-shrink:0; }
.upload-preview .up-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text-primary); font-weight:700; }
.upload-preview .up-size { color:var(--text-dim); font-size:10px; flex-shrink:0; }
.upload-preview .up-remove { cursor:pointer; color:var(--red); font-size:14px; flex-shrink:0; line-height:1; }
.upload-progress { height:3px; border-radius:2px; background:var(--border); margin-top:6px; overflow:hidden; }
.upload-progress-bar { height:100%; background:linear-gradient(90deg,var(--secondary),var(--accent2)); border-radius:2px; transition:width .3s; }
.url-or-upload { display:flex; align-items:center; gap:8px; margin:8px 0 4px; }
.url-or-upload::before,.url-or-upload::after { content:''; flex:1; height:1px; background:var(--border); }
.url-or-upload span { font-size:9.5px; color:var(--text-dim); font-weight:700; text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }

/* ══ PLAYBOOKS ══ */
.playbook-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px; overflow:hidden; cursor:pointer; transition:border-color var(--tf); }
.playbook-card:hover { border-color:var(--border-hover); }
.playbook-header { padding:16px 18px; display:flex; align-items:center; gap:12px; }
.playbook-icon { width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; background:var(--grey-faint); border:1px solid var(--border); flex-shrink:0; }
.playbook-info { flex:1; }
.playbook-info h4 { font-size:12.5px; font-weight:700; margin-bottom:2px; }
.playbook-info p { font-size:10.5px; color:var(--text-secondary); }
.playbook-body { padding:0 18px 16px; border-top:1px solid var(--border); display:none; }
.playbook-body.open { display:block; }
.playbook-step { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
.playbook-step:last-child { border:none; }
.step-num { width:20px; height:20px; border-radius:5px; background:rgba(9,242,137,.1); border:1px solid rgba(9,242,137,.2); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:var(--secondary); flex-shrink:0; margin-top:1px; }
.step-text { font-size:11.5px; color:var(--text-secondary); line-height:1.6; }

/* ══ ORGANOGRAMA ══ */
.org-chart { overflow-x:auto; padding:16px 0; }
.org-node { display:inline-flex; flex-direction:column; align-items:center; gap:6px; }
.org-dept { background:linear-gradient(135deg,var(--accent2),var(--secondary)); border-radius:10px; padding:10px 18px; font-size:11.5px; font-weight:800; color:var(--primary); text-align:center; min-width:120px; }
.org-teams { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.org-team { background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:7px 12px; font-size:10.5px; font-weight:600; text-align:center; min-width:90px; }
.org-connector { width:1px; height:20px; background:var(--border-hover); margin:0 auto; }

/* ══ ADMIN TABS ══ */
.admin-tabs { display:flex; gap:4px; margin-bottom:18px; flex-wrap:wrap; border-bottom:1px solid var(--border); padding-bottom:0; }
.admin-tab { padding:8px 16px; border-radius:var(--radius-sm) var(--radius-sm) 0 0; font-size:11.5px; font-weight:700; cursor:pointer; border:1px solid transparent; border-bottom:none; color:var(--text-dim); background:none; transition:all var(--tf); font-family:inherit; margin-bottom:-1px; }
.admin-tab:hover { color:var(--text-primary); background:var(--grey-faint); }
.admin-tab.active { background:var(--bg-card); border-color:var(--border); border-bottom-color:var(--bg-card); color:var(--secondary); }
.admin-tab-panel { display:none; }
.admin-tab-panel.active { display:block; }

/* ══ ABAS DE MÓDULO (tabs dentro de seções) ══ */
.module-tabs { display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
.module-tab { padding:7px 14px; border-radius:var(--radius-sm) var(--radius-sm) 0 0; font-size:11px; font-weight:700; cursor:pointer; border:1px solid transparent; border-bottom:none; color:var(--text-dim); background:none; transition:all var(--tf); font-family:inherit; margin-bottom:-1px; }
.module-tab:hover { color:var(--text-primary); background:var(--grey-faint); }
.module-tab.active { background:var(--bg-card); border-color:var(--border); border-bottom-color:var(--bg-card); color:var(--secondary); }
.module-panel { display:none; animation:fadeIn .2s var(--ease); }
.module-panel.active { display:block; }

/* ══ PERMISSÕES TOGGLE ══ */
.perm-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:8px; }
.perm-item { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--grey-faint); border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; transition:all var(--tf); user-select:none; }
.perm-item:hover { border-color:var(--border-hover); }
.perm-item.on { background:rgba(9,242,137,.07); border-color:rgba(9,242,137,.2); }
.perm-toggle { width:30px; height:17px; border-radius:9px; background:var(--border-hover); position:relative; flex-shrink:0; transition:background var(--tf); }
.perm-toggle::after { content:''; position:absolute; width:11px; height:11px; border-radius:50%; background:#fff; top:3px; left:3px; transition:transform var(--tf); }
.perm-item.on .perm-toggle { background:var(--secondary); }
.perm-item.on .perm-toggle::after { transform:translateX(13px); }
.perm-emoji { font-size:14px; flex-shrink:0; }
.perm-label { font-size:11px; font-weight:600; flex:1; line-height:1.3; }

/* ══ PERFIL COM FOTO ══ */
.profile-photo-wrap { position:relative; width:80px; height:80px; flex-shrink:0; }
.profile-photo { width:80px; height:80px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900; color:#fff; overflow:hidden; border:2px solid var(--border-hover); }
.profile-photo img { width:100%; height:100%; object-fit:cover; }
.profile-photo-btn { position:absolute; bottom:-5px; right:-5px; width:24px; height:24px; border-radius:7px; background:var(--secondary); color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:11px; border:2px solid var(--bg-base); cursor:pointer; overflow:hidden; }
.profile-photo-btn input { position:absolute; inset:0; opacity:0; cursor:pointer; }

/* ══ SIDEBAR OCULTA ══ */
.sidebar-hidden .sidebar { transform:translateX(-270px) !important; }
.sidebar-hidden .main { margin-left:0 !important; }
.sidebar-reveal-btn { position:fixed; top:12px; left:12px; z-index:500; width:34px; height:34px; background:var(--bg-card); border:1px solid var(--border-hover); border-radius:10px; display:none; align-items:center; justify-content:center; cursor:pointer; color:var(--text-secondary); font-size:16px; transition:all var(--tf); backdrop-filter:blur(10px); box-shadow:0 4px 16px rgba(0,0,0,.3); }
.sidebar-hidden .sidebar-reveal-btn { display:flex; }
.sidebar-reveal-btn:hover { color:var(--secondary); border-color:rgba(9,242,137,.3); }

/* ══ MURAL RICO ══ */
.mural-card { background:var(--bg-card); border:1px solid var(--border); border-left:3px solid var(--secondary); border-radius:var(--radius); padding:18px 20px; margin-bottom:9px; transition:border-color var(--tf); }
.mural-card:hover { border-color:var(--secondary); }
.mural-card-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.mural-card-avatar { width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff; flex-shrink:0; }
.mural-card-info h4 { font-size:13px; font-weight:800; }
.mural-card-info p { font-size:10px; color:var(--text-dim); }
.mural-card-body { font-size:12px; color:var(--text-secondary); line-height:1.7; }
.mural-card-image { margin-top:12px; border-radius:var(--radius-sm); overflow:hidden; }
.mural-card-image img { width:100%; max-height:320px; object-fit:cover; display:block; }
.mural-card-link { margin-top:10px; display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:var(--secondary); text-decoration:none; padding:6px 12px; background:rgba(9,242,137,.06); border:1px solid rgba(9,242,137,.15); border-radius:var(--radius-sm); transition:all var(--tf); }
.mural-card-link:hover { background:rgba(9,242,137,.12); }

/* ══ PLAYBOOK RICO ══ */
.pb-resource { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--grey-faint); border:1px solid var(--border); border-radius:var(--radius-sm); margin-top:5px; font-size:11.5px; transition:border-color var(--tf); }
.pb-resource:hover { border-color:var(--border-hover); }

/* ══ LOADER ══ */
.loader { display:flex; align-items:center; justify-content:center; padding:40px; }
.loader-ring { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--secondary); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ══ LIGHT THEME ══ */
[data-theme="light"] { --primary:#F4F7FB; --bg-base:#FFFFFF; --bg-card:rgba(244,247,251,.9); --bg-card-hover:rgba(235,240,248,.95); --text-primary:#0F172A; --text-secondary:#475569; --text-dim:#94A3B8; --grey-faint:rgba(10,22,40,.04); --border:rgba(10,22,40,.09); --border-hover:rgba(10,22,40,.16); --secondary:#05A85F; --accent:#E03500; }

.tb-btn.theme .i-sun { display:none; }

/* ══ RESPONSIVE ══ */
@media(max-width:768px) {

}

<script>
/* ═══════════════════════════════════════════════════════════
   PIPER PROTEGE PORTAL v9 — SISTEMA COMPLETO E DINÂMICO
   ═══════════════════════════════════════════════════════════ */

// ══════════════════════════
//  BANCO DE DADOS (localStorage)
// ══════════════════════════
const DB = {
  _prefix: 'pp9_',
  get(k, def=null) { try { const v=localStorage.getItem(this._prefix+k); return v!==null?JSON.parse(v):def; } catch { return def; } },
  set(k, v) { try { localStorage.setItem(this._prefix+k, JSON.stringify(v)); } catch {} },
  del(k) { localStorage.removeItem(this._prefix+k); },

  // Identidade visual
  getIdentity() { return this.get('identity', { name:'Piper Protege', tagline:'Protegendo quem protege', logo:'', cover:'', colorPrimary:'#01023B', colorSecondary:'#09F289' }); },
  setIdentity(v) { this.set('identity', v); },

  // Sessão atual
  getSession() { return this.get('session', null); },
  setSession(v) { this.set('session', v); },
  clearSession() { this.del('session'); },

  // Usuários cadastrados
  getUsers() { return this.get('users', []); },
  setUsers(v) { this.set('users', v); },

  // Organização
  getOrg() { return this.get('org', { depts:[], teams:[], roles:['Admin','Líder','Colaborador'] }); },
  setOrg(v) { this.set('org', v); },

  // Comunicados
  getComms() { return this.get('comms', []); },
  setComms(v) { this.set('comms', v); },

  // Trilhas da universidade
  getTracks() { return this.get('tracks', []); },
  setTracks(v) { this.set('tracks', v); },

  // Progresso de trilhas (por usuário)
  getProgress(userId) { return this.get('prog_'+userId, {}); },
  setProgress(userId, v) { this.set('prog_'+userId, v); },

  // FAQ categorias
  getFaqCats() { return this.get('faqcats', []); },
  setFaqCats(v) { this.set('faqcats', v); },

  // Playbooks
  getPlaybooks() { return this.get('playbooks', []); },
  setPlaybooks(v) { this.set('playbooks', v); },

  // Onboarding
  getOnboarding() { return this.get('onboarding', []); },
  setOnboarding(v) { this.set('onboarding', v); },

  // Cultura / Mural
  getCulture() { return this.get('culture', []); },
  setCulture(v) { this.set('culture', v); },
  getMural() { return this.get('mural', []); },
  setMural(v) { this.set('mural', v); },

  // Metas
  getGoals() { return this.get('goals', []); },
  setGoals(v) { this.set('goals', v); },

  // Comunicados lidos
  getReadComms(userId) { return this.get('readcomms_'+userId, []); },
  setReadComms(userId, v) { this.set('readcomms_'+userId, v); },
  // Permissões de usuário
  getUserPerms(userId) { return this.get('perms_'+userId, null); }, // null = acesso total
  setUserPerms(userId, v) { this.set('perms_'+userId, v); },
};

// ══════════════════════════
//  PERMISSÕES
// ══════════════════════════
const ALL_MODULE_PERMS = [
  { key:'comunicacao',  label:'Comunicação',    emoji:'📢' },
  { key:'universidade', label:'Universidade',   emoji:'🎓' },
  { key:'faq',          label:'FAQ',            emoji:'💡' },
  { key:'playbooks',    label:'Playbooks',      emoji:'📋' },
  { key:'onboarding',   label:'Onboarding',     emoji:'🚀' },
  { key:'resultados',   label:'Resultados',     emoji:'📈' },
  { key:'cultura',      label:'Cultura',        emoji:'🏆' },
  { key:'mural',        label:'Mural',          emoji:'⭐' },
  { key:'identidade',   label:'Identidade',     emoji:'🎨' },
  { key:'organograma',  label:'Organograma',    emoji:'🗂️' },
  { key:'sidebar',      label:'Menu Lateral',   emoji:'📌', special:true },
];

function getUserId(u) { return u.email || u.name || 'user'; }

function canSeeModule(modKey) {
  const u = getSession();
  if (u.role === 'Admin') return true;
  const uid = getUserId(u);
  const perms = DB.getUserPerms(uid);
  if (!perms) return true; // sem restrição = acesso total
  return perms[modKey] !== false; // false = bloqueado
}

function isSidebarHidden() {
  const u = getSession();
  if (u.role === 'Admin') return false;
  const uid = getUserId(u);
  const perms = DB.getUserPerms(uid);
  if (!perms) return false;
  return perms['sidebar'] === false;
}

function applySidebarVisibility() {
  const hidden = isSidebarHidden();
  document.body.classList.toggle('sidebar-hidden', hidden);
  if (hidden) {
    document.getElementById('mainEl').style.marginLeft = '0';
  } else {
    document.getElementById('mainEl').style.marginLeft = '';
  }
}

function toggleSidebarHidden() {
  document.body.classList.toggle('sidebar-hidden');
}

// ══════════════════════════
//  BREADCRUMB & TÍTULO DINÂMICO
// ══════════════════════════
let breadcrumbTrail = []; // [{label, emoji, action}]

function setBreadcrumb(trail) {
  breadcrumbTrail = trail;
  const nav = document.getElementById('breadcrumbNav');
  if (!nav) return;
  if (!trail || trail.length === 0) { nav.innerHTML = ''; return; }
  nav.innerHTML = trail.map((item, i) => {
    const isLast = i === trail.length - 1;
    const el = `<span class="breadcrumb-item${isLast ? ' current' : ''}"
      ${!isLast && item.action ? `onclick="${item.action}"` : ''}>
      ${item.emoji ? `<span>${item.emoji}</span>` : ''}${item.label}
    </span>`;
    return i === 0 ? el : `<span class="breadcrumb-sep">›</span>${el}`;
  }).join('');
  // Update page title
  const id = DB.getIdentity();
  const last = trail[trail.length - 1];
  document.title = `${last.label} — ${id.name}`;
}

function clearBreadcrumb() {
  setBreadcrumb([]);
  const id = DB.getIdentity();
  document.title = id.name + ' — Portal';
}

// ══════════════════════════
//  GAMIFICAÇÃO
// ══════════════════════════
const ACHIEVEMENTS = [
  { id:'first_lesson',   icon:'🎯', title:'Primeira Aula',     desc:'Concluiu sua primeira aula',         points:10 },
  { id:'level_1',        icon:'⭐', title:'Primeiro Nível',    desc:'Concluiu um nível completo',          points:25 },
  { id:'track_complete', icon:'🏆', title:'Trilha Completa',   desc:'Finalizou uma trilha inteira',        points:100 },
  { id:'five_lessons',   icon:'🔥', title:'Em Chamas',         desc:'5 aulas concluídas',                  points:30 },
  { id:'ten_lessons',    icon:'💎', title:'Dedicado',          desc:'10 aulas concluídas',                 points:60 },
  { id:'perfect_level',  icon:'✨', title:'Nível Perfeito',    desc:'Concluiu um nível sem pular aulas',   points:40 },
  { id:'early_bird',     icon:'🌅', title:'Madrugador',        desc:'Acessou o portal antes das 8h',       points:15 },
  { id:'streak_3',       icon:'📅', title:'3 Dias Seguidos',   desc:'Estudou 3 dias consecutivos',         points:50 },
];

function getUserAchievements(userId) {
  return DB.get('achievements_' + userId, []);
}
function setUserAchievements(userId, arr) {
  DB.set('achievements_' + userId, arr);
}
function getUserPoints(userId) {
  return DB.get('points_' + userId, 0);
}
function addUserPoints(userId, pts) {
  const current = getUserPoints(userId);
  DB.set('points_' + userId, current + pts);
}

function checkAndGrantAchievement(userId, achievementId, context) {
  const earned = getUserAchievements(userId);
  if (earned.includes(achievementId)) return false;
  const ach = ACHIEVEMENTS.find(a => a.id === achievementId);
  if (!ach) return false;
  earned.push(achievementId);
  setUserAchievements(userId, earned);
  addUserPoints(userId, ach.points);
  showAchievementPop(ach);
  return true;
}

function showAchievementPop(ach) {
  // Remove existing
  const existing = document.getElementById('achievementPop');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'achievement-pop';
  div.id = 'achievementPop';
  div.innerHTML = `<div class="achievement-card-pop">
    <div class="achievement-icon-pop">${ach.icon}</div>
    <div class="achievement-info-pop">
      <strong>🏅 Conquista Desbloqueada!</strong>
      <span>${ach.title} — ${ach.desc}</span>
      <span style="color:var(--accent3);font-size:10px;margin-top:2px;display:block">+${ach.points} pontos</span>
    </div>
  </div>`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 4000);
}

function checkAchievementsAfterLesson(userId) {
  const allTracks = DB.getTracks();
  let totalDone = 0;
  let trackComplete = false;
  let levelComplete = false;
  let levelTotal = 0;
  let levelDone = 0;

  allTracks.forEach((t, ti) => {
    const prog = DB.getProgress(userId);
    const trackKey = 'track_' + ti;
    const trackProg = prog[trackKey] || {};
    let tTotal = 0, tDone = 0;
    t.levels.forEach((lv, li) => {
      const lessons = lv.lessons || [];
      tTotal += lessons.length;
      lessons.forEach((_, ii) => {
        if (trackProg[`${trackKey}_lv${li}_${ii}`]) { tDone++; totalDone++; }
      });
    });
    if (tTotal > 0 && tDone === tTotal) trackComplete = true;
  });

  if (totalDone >= 1) checkAndGrantAchievement(userId, 'first_lesson');
  if (totalDone >= 5) checkAndGrantAchievement(userId, 'five_lessons');
  if (totalDone >= 10) checkAndGrantAchievement(userId, 'ten_lessons');
  if (trackComplete) checkAndGrantAchievement(userId, 'track_complete');

  // Check early bird
  const hour = new Date().getHours();
  if (hour < 8) checkAndGrantAchievement(userId, 'early_bird');

  // Streak check
  checkStreakAchievement(userId);
}

function checkStreakAchievement(userId) {
  const today = new Date().toDateString();
  const streakData = DB.get('streak_' + userId, { last:'', count:0 });
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (streakData.last === today) return;
  if (streakData.last === yesterday) {
    streakData.count++;
  } else {
    streakData.count = 1;
  }
  streakData.last = today;
  DB.set('streak_' + userId, streakData);
  if (streakData.count >= 3) checkAndGrantAchievement(userId, 'streak_3');
}

function findContinueLesson(userId) {
  // Find the next uncompleted lesson across all tracks
  const allTracks = DB.getTracks();
  for (let ti = 0; ti < allTracks.length; ti++) {
    const t = allTracks[ti];
    const prog = DB.getProgress(userId);
    const trackKey = 'track_' + ti;
    const trackProg = prog[trackKey] || {};
    for (let li = 0; li < t.levels.length; li++) {
      const lessons = t.levels[li].lessons || [];
      // Check if level is unlocked
      let unlocked = li === 0;
      if (!unlocked) {
        const prevLessons = t.levels[li-1].lessons || [];
        const prevDone = prevLessons.filter((_, ii) => trackProg[`${trackKey}_lv${li-1}_${ii}`]).length;
        unlocked = prevLessons.length === 0 || prevDone === prevLessons.length;
      }
      if (!unlocked) break; // Stop at first locked level
      for (let ii = 0; ii < lessons.length; ii++) {
        if (!trackProg[`${trackKey}_lv${li}_${ii}`]) {
          return { ti, li, ii, trackName: t.name, levelName: t.levels[li].level, lessonTitle: lessons[ii].title };
        }
      }
    }
  }
  return null; // all done!
}

function getTotalProgress(userId) {
  const allTracks = DB.getTracks();
  let total = 0, done = 0;
  allTracks.forEach((t, ti) => {
    const prog = DB.getProgress(userId);
    const trackKey = 'track_' + ti;
    const trackProg = prog[trackKey] || {};
    t.levels.forEach((lv, li) => {
      const lessons = lv.lessons || [];
      total += lessons.length;
      lessons.forEach((_, ii) => { if (trackProg[`${trackKey}_lv${li}_${ii}`]) done++; });
    });
  });
  return { total, done, pct: total > 0 ? Math.round((done/total)*100) : 0 };
}

function buildRanking() {
  const users = DB.getUsers();
  return users.map(u => {
    const uid = getUserId(u);
    const pts = getUserPoints(uid);
    const prog = getTotalProgress(uid);
    return { name: u.name, photo: u.photo, dept: u.dept, points: pts, lessonsCompleted: prog.done, pct: prog.pct };
  }).sort((a, b) => b.points - a.points || b.lessonsCompleted - a.lessonsCompleted);
}

    }

function renderSidebar() {
  const u = getSession();
  let nav = '';

  nav += `<div class="nav-group">
    <div class="nav-group-header">
      <span class="nav-label">Principal</span>
    </div>
    <div class="nav-group-items" style="max-height:200px">
      <button class="nav-item" onclick="goHome()" id="nav-home"><span class="nav-emoji">🏠</span><span class="nav-item-label">Início</span></button>
    </div>
  </div>`;

  const groups = {};
  Object.keys(MODULES).forEach(k => {
    const m = MODULES[k];
    if (m.adminOnly && u.role !== 'Admin') return;
    if (!canSeeModule(k)) return;
    if (m.group === 'principal') return;
    if (!groups[m.group]) groups[m.group] = [];
    groups[m.group].push(k);
  });

  Object.keys(groups).forEach(gk => {
    if (gk === 'principal') return;
    const gInfo = NAV_GROUPS[gk] || { label: gk };
    const isCollapsed = collapsedGroups[gk] === true;
    const items = groups[gk].map(k => {
      const m = MODULES[k];
      let badge = '';
      if (k === 'comunicacao') { const cnt = getUnreadCommsCount(); if (cnt > 0) badge = `<span class="nav-badge">${cnt}</span>`; }
      return `<button class="nav-item" onclick="showModule('${k}')" id="nav-${k}"><span class="nav-emoji">${m.emoji}</span><span class="nav-item-label">${m.name}</span>${badge}</button>`;
    }).join('');

    if (!items) return;

    nav += `<div class="nav-group${isCollapsed ? ' collapsed' : ''}" id="navgroup-${gk}">
      <div class="nav-group-header" onclick="toggleNavGroup('${gk}')">
        <span class="nav-label">${gInfo.label}</span>
        <svg class="nav-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="nav-group-items" style="max-height:${isCollapsed ? '0' : '500px'}">
        ${items}
      </div>
    </div>`;
  });

  document.getElementById('sidebarNav').innerHTML = nav;
}

function toggleNavGroup(gk) {
  collapsedGroups[gk] = !collapsedGroups[gk];
  DB.set('collapsedGroups', collapsedGroups);
  const group = document.getElementById('navgroup-' + gk);
  if (!group) return;
  group.classList.toggle('collapsed', collapsedGroups[gk]);
  const items = group.querySelector('.nav-group-items');
  if (items) items.style.maxHeight = collapsedGroups[gk] ? '0' : '500px';
}

function toggleSidebarCollapse() {
  sidebarCollapsed = !sidebarCollapsed;
  DB.set('sidebarCollapsed', sidebarCollapsed);
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
  document.getElementById('mainEl').classList.toggle('expanded', sidebarCollapsed);
}

  document.getElementById('sidebar').classList.toggle('mobile-open');

}

function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');

}

function renderUserCard() {
  const u = getSession();
  const initial = (u.name || '?')[0].toUpperCase();
  const bg = getAvatarColor(u.name);

  document.getElementById('sidebarUserRole').textContent = (u.role || 'Colaborador') + (u.dept ? ' · '+u.dept : '');

    avatarBtn.style.background = bg;

}

  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

      <div><strong style="font-size:12px;color:var(--secondary)">Parabéns! Você concluiu todas as aulas disponíveis.</strong><br><span style="font-size:10.5px;color:var(--text-secondary)">Fique de olho em novas trilhas.</span></div>
    </div>`;
  }

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">

      </div>

      <div style="font-size:10px;color:var(--text-dim);margin-top:5px">${totalProg.done} de ${totalProg.total} aulas concluídas · ${getUserPoints(userId)} pontos</div>

        <div class="hero-tag">● Sistema ativo</div>

function showModule(mod) {
  if (!MODULES[mod]) return;
  const target = document.getElementById(mod);
  if (!target) return;
  hideAll(); showEl(mod); setNav('nav-'+mod); currentModule = mod;
  closeMobileSidebar();
  // Set breadcrumb
  const m = MODULES[mod];
  setBreadcrumb([
    { label:'Início', emoji:'🏠', action:'goHome()' },
    { label:m.name, emoji:m.emoji },
  ]);
  target.innerHTML = `<div class="loader"><div class="loader-ring"></div></div>`;
  setTimeout(() => {
    try { renderModule(mod, target); }
    catch(err) { target.innerHTML = emptyState('⚠️', 'Erro: '+err.message) + `<button class="btn btn-primary" onclick="goHome()">Voltar</button>`; }
    window.scrollTo({ top:0, behavior:'smooth' });
  }, 120);
}

// ══════════════════════════
//  RENDER MODULE
// ══════════════════════════
function renderModule(mod, el) {
  const m = MODULES[mod];
  const u = getSession();
  if (m.adminOnly && u.role !== 'Admin') {
    el.innerHTML = backBtn + emptyState('🔒', 'Acesso restrito a administradores.');
    return;
  }

  // For universidade we let the render function handle the full header
  const skipHeader = (mod === 'universidade');
  let h = backBtn;
  if (!skipHeader) {
    let progressIndicator = '';
    // Show section progress pill for relevant modules
    if (mod === 'universidade') {
      const userId = getUserId(u);
      const prog = getTotalProgress(userId);
      progressIndicator = `<span style="font-size:10px;color:var(--secondary);background:rgba(9,242,137,.08);border:1px solid rgba(9,242,137,.15);padding:3px 8px;border-radius:20px;font-weight:700">${prog.pct}% concluído</span>`;
    }
    h += `<div class="page-title-bar"><div><h1 style="font-size:17px;font-weight:800">${m.emoji} ${m.name}</h1></div>${progressIndicator}</div>`;
  }

  switch(mod) {
    case 'comunicacao':  h += renderComunicacao(); break;
    case 'universidade': h += renderUniversidade(); break;
    case 'faq':          h += renderFaq(); break;
    case 'playbooks':    h += renderPlaybooks(); break;
    case 'onboarding':   h += renderOnboarding(); break;
    case 'resultados':   h += renderResultados(); break;
    case 'cultura':      h += renderCultura(); break;
    case 'mural':        h += renderMural(); break;
    case 'identidade':   h += renderIdentidade(); break;
    case 'organograma':  h += renderOrganograma(); break;
    case 'admin':        h += renderAdmin(); break;
    default: h += emptyState('📦', 'Módulo em construção.');
  }
  el.innerHTML = h;
}

// ══════════════════════════
function renderComunicacao() {
  const comms = DB.getComms();
  const u = getSession();
  const read = DB.getReadComms(u.email || u.name);
  const relevant = comms.filter(c => c.targetDept === 'Todos' || c.targetDept === u.dept);
  if (!relevant.length) return emptyState('📢', 'Nenhum comunicado publicado.', u.role === 'Admin' ? 'Criar Comunicado' : null, "showModule('admin')");

  const prioColor = { urgent:'red', important:'blue', info:'grey' };
  const prioLabel = { urgent:'🔴 Urgente', important:'🟡 Importante', info:'🟢 Info' };

  return relevant.map(c => {
    const isRead = read.includes(c.id);
    return `<div class="feed-card" style="${!isRead ? 'border-left:2px solid var(--secondary)' : ''}">
      <div class="feed-header">
        <div><div class="feed-author">${c.author||'Admin'} <span class="tag tag-${prioColor[c.priority]||'grey'}">${prioLabel[c.priority]||'Info'}</span></div>
        <div class="feed-time">${c.date}${c.targetDept && c.targetDept !== 'Todos' ? ' · '+c.targetDept : ''}</div></div>
      </div>
      <div class="feed-title">${c.title}</div>
      <div class="feed-body">${c.body}</div>
      ${!isRead ? `<div class="confirm-strip"><span>📋 Confirme a leitura</span><button class="btn btn-primary btn-sm" onclick="markCommRead('${c.id}')">✅ Li e estou ciente</button></div>` : `<div class="confirm-strip done"><span>✅ Lido em ${c.date}</span></div>`}
    </div>`;
  }).join('');
}

function markCommRead(id) {
  const u = getSession();
  const key = u.email || u.name;
  const read = DB.getReadComms(key);
  if (!read.includes(id)) { read.push(id); DB.setReadComms(key, read); }
  updateNotifBadge();
  renderSidebar();
  showModule('comunicacao');
}

//  RESULTADOS — TABBED (individual vs equipe)
// ══════════════════════════
let resultadosTab = 'equipe';

function renderResultados() {
  const goals = DB.getGoals();
  const u = getSession();
  const uid = getUserId(u);
  const perms = DB.getUserPerms(uid);

  if (!goals.length) return emptyState('📈', 'Nenhuma meta configurada.', u.role==='Admin' ? 'Configurar Metas' : null, "showModule('admin')");

  // Metas de equipe/todos
  const teamGoals = goals.filter(g => !g.dept || g.dept === 'Todos' || g.dept === u.dept);
  // Metas individuais (dept = nome do usuário ou marcadas como individual)
  const indivGoals = goals.filter(g => g.individual && (g.targetUser === u.name || g.targetUser === u.email));

  const tabs = [];
  if (teamGoals.length) tabs.push({ id:'equipe', label:'👥 Equipe/Geral' });
  if (indivGoals.length) tabs.push({ id:'individual', label:'🎯 Individual' });
  if (!tabs.length) return emptyState('📈', 'Nenhuma meta disponível para você.');

  if (!tabs.find(t => t.id === resultadosTab)) resultadosTab = tabs[0].id;

  const tabsHtml = tabs.length > 1 ? `<div class="module-tabs">${tabs.map(t =>
    `<button class="module-tab${resultadosTab===t.id?' active':''}" onclick="resultadosTab='${t.id}';showModule('resultados')">${t.label}</button>`
  ).join('')}</div>` : '';

  const activeGoals = resultadosTab === 'individual' ? indivGoals : teamGoals;

  const grid = `<div class="stat-grid">${activeGoals.map(g => `
    <div class="stat-card">
      <div class="stat-value">${g.value}</div>
      <div class="stat-label">${g.name}</div>
      ${g.period ? `<div class="stat-sublabel">${g.period}</div>` : ''}
      ${g.type ? `<div class="stat-sublabel" style="margin-top:4px"><span class="tag tag-grey">${g.type}</span></div>` : ''}
    </div>`).join('')}</div>`;

  return tabsHtml + `<div class="module-panel active">${grid}</div>`;
}

// Tipos de mídia suportados
function getLessonIcon(lesson) {
  const type = lesson.type || 'text';
  const icons = { video:'▶️', image:'🖼️', pdf:'📑', slides:'📊', podcast:'🎙️', link:'🔗', text:'📄' };
  return icons[type] || '📄';
}

function getLessonTypeLabel(type) {
  const labels = { video:'Vídeo', image:'Imagem', pdf:'PDF', slides:'Slides', podcast:'Podcast', link:'Link', text:'Texto' };
  return labels[type] || 'Conteúdo';
}

// Retorna true se o nível anterior está 100% completo (ou se é o primeiro nível)
function isLevelUnlocked(trackProg, trackKey, li, lvLessons) {
  if (li === 0) return true;
  const prevLvKey = `${trackKey}_lv${li-1}`;
  // Precisa ter pelo menos 1 aula no nível anterior e todas concluídas
  if (!lvLessons || !lvLessons.length) return true; // sem aulas, considera desbloqueado
  const prevLessons = lvLessons; // será calculado pelo chamador
  return false; // fallback — o chamador calcula
}

let uniActiveTab = null;
let uniView = 'trilhas'; // 'trilhas' | 'conquistas' | 'ranking'

function renderUniversidade() {
  const allTracks = DB.getTracks();
  const u = getSession();
  const userId = getUserId(u);
  if (!allTracks.length) return emptyState('🎓', 'Nenhuma trilha cadastrada.', u.role==='Admin' ? 'Criar Trilha' : null, "showModule('admin')");

  const sectors = [...new Set(allTracks.map(t => t.sector || 'Geral'))];
  if (!uniActiveTab || !sectors.includes(uniActiveTab)) uniActiveTab = sectors[0];

  // Update breadcrumb with sector context
  setBreadcrumb([
    { label:'Início', emoji:'🏠', action:'goHome()' },
    { label:'Universidade', emoji:'🎓', action:"showModule('universidade')" },
    { label: uniActiveTab || 'Trilhas' },
  ]);

  // Top view tabs: Trilhas / Conquistas / Ranking
  const viewTabs = `<div class="module-tabs" style="margin-bottom:12px">
    <button class="module-tab${uniView==='trilhas'?' active':''}" onclick="uniView='trilhas';showModule('universidade')">📚 Trilhas</button>
    <button class="module-tab${uniView==='conquistas'?' active':''}" onclick="uniView='conquistas';showModule('universidade')">🏅 Conquistas</button>
    <button class="module-tab${uniView==='ranking'?' active':''}" onclick="uniView='ranking';showModule('universidade')">🏆 Ranking</button>
  </div>`;

  if (uniView === 'conquistas') return viewTabs + renderConquistas(userId);
  if (uniView === 'ranking')    return viewTabs + renderRanking();

  // ── TRILHAS VIEW ──
  const totalProg = getTotalProgress(userId);
  const continueLesson = findContinueLesson(userId);

  // Overall progress header
  let headerHtml = `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:13px;font-weight:800">Progresso Geral</div>
        <div style="font-size:10.5px;color:var(--text-dim)">${totalProg.done} de ${totalProg.total} aulas · ${getUserPoints(userId)} pts</div>
      </div>
      <div style="font-size:22px;font-weight:900;color:var(--secondary);font-family:'Space Grotesk',sans-serif">${totalProg.pct}%</div>
    </div>
    <div class="progress-wrap" style="margin:0;height:8px"><div class="progress-fill" style="width:${totalProg.pct}%"></div></div>
  </div>`;

  // Continue button
  if (continueLesson) {
    headerHtml += `<button class="continue-btn" onclick="const tb=document.getElementById('track-body-${continueLesson.ti}');if(tb){tb.style.display='block';const ch=tb.closest('.track-card')?.querySelector('.track-chevron');if(ch)ch.style.transform='rotate(180deg)';}setTimeout(()=>openLesson(${continueLesson.ti},${continueLesson.li},${continueLesson.ii}),80)">
      <div class="continue-btn-icon">▶️</div>
      <div style="flex:1">
        <div class="continue-btn-label">Continuar de onde parei</div>
        <div class="continue-btn-title">${continueLesson.lessonTitle}</div>
        <div class="continue-btn-meta">${continueLesson.trackName} · ${continueLesson.levelName}</div>
      </div>
      <div class="continue-btn-arrow">→</div>
    </button>`;
  }

  // Sector tabs
  let sectorTabsHtml = '';
  if (sectors.length > 1) {
    sectorTabsHtml = `<div class="module-tabs">${sectors.map(s =>
      `<button class="module-tab${uniActiveTab===s?' active':''}" onclick="uniActiveTab=\`${s}\`;showModule('universidade')">${s}</button>`
    ).join('')}</div>`;
  }

  const tracks = allTracks.filter(t => (t.sector || 'Geral') === uniActiveTab);
  const levelColors = ['#2F06CC','#10B981','#FFB800','#FF3D02'];
  const levelBgs   = ['rgba(47,6,204,.15)','rgba(16,185,129,.15)','rgba(255,184,0,.15)','rgba(255,61,2,.15)'];

  let body = '';
  tracks.forEach((t, localTi) => {
    const ti = allTracks.indexOf(t);
    const progress  = DB.getProgress(userId);
    const trackKey  = 'track_' + ti;
    const trackProg = progress[trackKey] || {};

    // Contagem total de aulas (formato rico: t.levels[].lessons[])
    let totalLessons = 0, doneLessons = 0;
    t.levels.forEach((lv, li) => {
      const lessons = lv.lessons || [];
      totalLessons += lessons.length;
      lessons.forEach((_, ii) => { if (trackProg[`${trackKey}_lv${li}_${ii}`]) doneLessons++; });
    });
    const pct = totalLessons > 0 ? Math.round((doneLessons / totalLessons) * 100) : 0;

    body += `<div class="track-card">
      <div class="track-header" onclick="toggleTrack('track-body-${ti}',this)">
        <div class="track-icon" style="background:linear-gradient(135deg,${levelColors[ti%4]},${levelColors[(ti+1)%4]})">${t.emoji||'📚'}</div>
        <div class="track-info">
          <h3>${t.name}</h3>
          <p>${t.sector||'Geral'} · ${t.levels.length} nível(is) · ${doneLessons}/${totalLessons} aulas · ${pct}%</p>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="progress-wrap" style="width:70px;margin:0"><div class="progress-fill" style="width:${pct}%"></div></div>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-dim);transition:transform var(--tr)" class="track-chevron"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="track-body" id="track-body-${ti}" style="display:none;padding:12px 18px 16px">`;

    t.levels.forEach((lv, li) => {
      const lessons    = lv.lessons || [];
      const lvKey      = `${trackKey}_lv${li}`;
      const lvDone     = lessons.filter((_, ii) => trackProg[`${trackKey}_lv${li}_${ii}`]).length;
      const lvPct      = lessons.length > 0 ? Math.round((lvDone / lessons.length) * 100) : 0;
      const lvComplete = lessons.length > 0 && lvDone === lessons.length;

      // Verificar se nível anterior foi 100% concluído
      let unlocked = (li === 0);
      if (!unlocked && li > 0) {
        const prevLessons = (t.levels[li-1].lessons || []);
        const prevDone = prevLessons.filter((_, ii) => trackProg[`${trackKey}_lv${li-1}_${ii}`]).length;
        unlocked = prevLessons.length === 0 || prevDone === prevLessons.length;
      }

      body += `<div class="level-card${unlocked ? '' : ' locked'}" style="margin-bottom:8px">
        <div class="level-header">
          <div class="level-badge" style="background:${levelBgs[li%4]};color:${levelColors[li%4]}">${unlocked ? (li+1) : '🔒'}</div>
          <div class="level-name">${lv.level||'Nível '+(li+1)}</div>
          ${lv.badge ? `<span class="tag tag-green">${lv.badge}</span>` : ''}
          ${!unlocked ? `<span class="tag tag-grey" style="margin-left:auto">Bloqueado</span>` : lessons.length ? `<span style="margin-left:auto;font-size:10px;color:var(--text-dim)">${lvDone}/${lessons.length} · ${lvPct}%</span>` : ''}
        </div>
        ${!unlocked ? `<div class="level-locked-bar">🔒 Conclua o nível anterior para desbloquear este módulo.</div>` : ''}
        ${unlocked && lessons.length > 0 ? `
          <div class="progress-wrap"><div class="progress-fill" style="width:${lvPct}%"></div></div>
          <div class="lesson-list">
            ${lessons.map((lesson, ii) => {
              const done = trackProg[`${trackKey}_lv${li}_${ii}`] || false;
              // Aula liberada se a anterior foi concluída (ou é a primeira)
              const lessonUnlocked = ii === 0 || trackProg[`${trackKey}_lv${li}_${ii-1}`];
              const icon = getLessonIcon(lesson);
              return `<div class="lesson-item${done?' done':''}${!lessonUnlocked?' locked-lesson':''}"
                onclick="${lessonUnlocked ? `openLesson(${ti},${li},${ii})` : ''}">
                <div class="lesson-icon">${icon}</div>
                <div class="lesson-info">
                  <div class="lesson-title">${lesson.title||'Sem título'}</div>
                  <div class="lesson-meta">${getLessonTypeLabel(lesson.type)}${lesson.duration?' · '+lesson.duration:''}</div>
                </div>
                <div class="lesson-check">${done?'✓':''}</div>
              </div>`;
            }).join('')}
          </div>` : unlocked && !lessons.length ? `<p style="font-size:11px;color:var(--text-dim);padding:4px 0">Nenhuma aula cadastrada neste nível ainda.</p>` : ''}
        ${unlocked && lvComplete && lv.badge ? `
          <div class="level-complete-banner">
            <div class="lcb-icon">🏅</div>
            <div><strong>Nível concluído! Badge: ${lv.badge}</strong><br><span style="font-size:10.5px;color:var(--text-secondary)">Continue para o próximo nível.</span></div>
          </div>` : ''}
        ${unlocked && lv.challenge ? `<div class="step-box" style="margin-top:8px"><strong>🎯 Desafio</strong><p>${lv.challenge}</p></div>` : ''}
        ${unlocked && lv.task ? `<div class="step-box" style="border-left-color:var(--accent2);margin-top:4px"><strong>📌 Tarefa</strong><p>${lv.task}</p></div>` : ''}
      </div>`;
    });

    body += `</div></div>`;
  });
  return viewTabs + headerHtml + sectorTabsHtml + `<div class="module-panel active">${body}</div>`;
}

function renderConquistas(userId) {
  const earned = getUserAchievements(userId);
  const pts = getUserPoints(userId);

  const earnedHtml = ACHIEVEMENTS.map(a => {
    const isEarned = earned.includes(a.id);
    return `<div class="achievement-badge ${isEarned ? 'earned' : 'locked'}" style="padding:8px 12px;font-size:11px">
      <span style="font-size:16px">${a.icon}</span>
      <div>
        <div style="font-weight:800">${a.title}</div>
        <div style="font-size:9.5px;opacity:.8">${a.desc} · +${a.points}pts</div>
      </div>
      ${isEarned ? '<span style="margin-left:auto">✓</span>' : '<span style="margin-left:auto;opacity:.4">🔒</span>'}

    <div style="font-size:22px;font-weight:900;color:var(--accent3);font-family:'Space Grotesk',sans-serif">${pts} pontos</div>

  const posClasses = ['gold','silver','bronze'];
